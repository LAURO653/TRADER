<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LAURO TRADER</title>

<style>
body{
  margin:0;
  background:#000;
  color:#d4af37;
  font-family:Arial;
  display:flex;
}

.sidebar{
  width:300px;
  min-height:100vh;
  border-right:2px solid #d4af37;
  padding:30px;
  box-sizing:border-box;
}

.logo{
  font-size:34px;
  font-weight:bold;
  margin-bottom:35px;
}

.menu div{
  margin:18px 0;
  font-size:18px;
}

.conta{
  margin-top:60px;
  border:1px solid #d4af37;
  border-radius:10px;
  padding:20px;
}

.main{
  flex:1;
  padding:35px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.criar{
  background:#d4af37;
  color:#000;
  border:0;
  padding:12px 25px;
  border-radius:8px;
  font-weight:bold;
}

.cards{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
  margin-top:25px;
}

.card{
  border:1px solid #d4af37;
  border-radius:10px;
  padding:18px;
  background:#080808;
}

.controls{
  margin:25px 0;
}

button{
  border:0;
  padding:12px 30px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.ligar{background:#00b050;color:white;}
.parar{background:#c00000;color:white;}

.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

.box{
  border:1px solid #d4af37;
  border-radius:12px;
  padding:20px;
  background:#080808;
}

canvas{
  width:100%;
  height:350px;
  background:#020202;
  border-radius:8px;
}

table{
  width:100%;
  font-size:14px;
}

td{
  padding:6px;
}

.win{color:#00ff66;}
.loss{color:red;}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">LAURO</div>

  <div class="menu">
    <div>📊 Dashboard</div>
    <div>🤖 Robôs</div>
    <div>📈 Sinais</div>
    <div>🎓 Aulas</div>
    <div>💎 Planos</div>
  </div>

  <div class="conta">
    Conta Demo<br><br>
    <b>R$ <span id="saldoLateral">1000</span></b>
  </div>
</div>

<div class="main">

  <div class="top">
    <h1>Dashboard</h1>
    <button class="criar">+ Criar Novo Robô</button>
  </div>

  <div class="cards">
    <div class="card">Saldo<br><b id="saldo">1000</b></div>
    <div class="card">Lucro<br><b id="lucro">0</b></div>
    <div class="card">Win Rate<br><b id="winrate">0%</b></div>
    <div class="card">Vitórias<br><b id="wins">0</b></div>
    <div class="card">Derrotas<br><b id="loss">0</b></div>
  </div>

  <div class="controls">
    <button class="ligar" onclick="ligar()">Ligar</button>
    <button class="parar" onclick="parar()">Parar</button>
    <span id="status" style="margin-left:20px;">Aguardando...</span>
  </div>

  <div class="grid">
    <div class="box">
      <h2>Gráfico de Desempenho</h2>
      <canvas id="grafico" width="900" height="350"></canvas>
    </div>

    <div class="box">
      <h2>Últimas Operações</h2>
      <table>
        <tbody id="historico"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
let saldo = 1000;
let vitorias = 0;
let derrotas = 0;
let rodando = false;
let intervalo = null;
let pontos = [1000];

function atualizarTela(){
  document.getElementById("saldo").innerText = saldo;
  document.getElementById("saldoLateral").innerText = saldo;
  document.getElementById("lucro").innerText = saldo - 1000;
  document.getElementById("wins").innerText = vitorias;
  document.getElementById("loss").innerText = derrotas;

  let total = vitorias + derrotas;
  let wr = total > 0 ? ((vitorias / total) * 100).toFixed(1) : 0;
  document.getElementById("winrate").innerText = wr + "%";

  desenharGrafico();
}

function desenharGrafico(){
  let canvas = document.getElementById("grafico");
  let ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "#020202";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle = "#222";
  ctx.lineWidth = 1;

  for(let i=0;i<10;i++){
    let y = i * 35;
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();
  }

  let min = Math.min(...pontos) - 20;
  let max = Math.max(...pontos) + 20;

  ctx.strokeStyle = "#d4af37";
  ctx.lineWidth = 3;
  ctx.beginPath();

  pontos.forEach((valor, i)=>{
    let x = (i / (pontos.length - 1 || 1)) * canvas.width;
    let y = canvas.height - ((valor - min) / (max - min)) * canvas.height;

    if(i === 0){
      ctx.moveTo(x,y);
    }else{
      ctx.lineTo(x,y);
    }
  });

  ctx.stroke();
}

function adicionarHistorico(resultado){
  let historico = document.getElementById("historico");
  let hora = new Date().toLocaleTimeString();

  let classe = resultado === "WIN" ? "win" : "loss";

  historico.innerHTML =
    `<tr>
      <td>${hora}</td>
      <td>EUR/USD</td>
      <td class="${classe}">${resultado}</td>
    </tr>` + historico.innerHTML;
}

function operar(){
  let ganhou = Math.random() > 0.45;

  if(ganhou){
    saldo += 10;
    vitorias++;
    adicionarHistorico("WIN");
  }else{
    saldo -= 10;
    derrotas++;
    adicionarHistorico("LOSS");
  }

  pontos.push(saldo);

  if(pontos.length > 40){
    pontos.shift();
  }

  atualizarTela();
}

function ligar(){
  if(rodando) return;

  rodando = true;
  document.getElementById("status").innerText = "Rodando...";

  intervalo = setInterval(operar, 1500);
}

function parar(){
  rodando = false;
  document.getElementById("status").innerText = "Parado";

  clearInterval(intervalo);
}

atualizarTela();
</script>

</body>
</html>
