<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LAURO TRADER PRO</title>

<style>
body{
  margin:0;
  background:#050505;
  color:white;
  font-family:Arial;
  display:flex;
}

.sidebar{
  width:250px;
  min-height:100vh;
  background:#050505;
  border-right:2px solid #d4af37;
  padding:22px;
  box-sizing:border-box;
}

.logo{
  font-size:34px;
  color:#d4af37;
  font-weight:bold;
  margin-bottom:35px;
}

.menu div{
  margin:18px 0;
  font-size:18px;
  color:#ddd;
}

.conta{
  margin-top:70px;
  border:1px solid #d4af37;
  border-radius:12px;
  padding:18px;
  background:#080808;
}

.main{
  flex:1;
  padding:12px;
}

.cards{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:10px;
  margin-bottom:10px;
}

.card{
  background:#080808;
  border:1px solid #d4af37;
  border-radius:10px;
  padding:10px;
  font-size:14px;
}

.valor{
  font-size:17px;
  font-weight:bold;
}

.green{color:#00ff66;}
.red{color:red;}

.controls{
  border:1px solid #d4af37;
  border-radius:10px;
  padding:10px;
  background:#080808;
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:10px;
}

select{
  background:#111;
  color:#d4af37;
  border:1px solid #d4af37;
  padding:10px;
  border-radius:8px;
  font-weight:bold;
}

button{
  border:0;
  padding:11px 24px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.ligar{background:#00b050;color:white;}
.parar{background:#c00000;color:white;}

.chart-box{
  border:2px solid #d4af37;
  border-radius:14px;
  background:#000;
  overflow:hidden;
  height:780px;
}

#tvchart{
  height:780px;
  width:100%;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">LAURO</div>

  <div class="menu">
    <div>📊 Dashboard</div>
    <div>🤖 Robôs</div>
    <div>📈 Sinais</div>
    <div>🎓 Aulas</div>
    <div>💎 Planos</div>
  </div>

  <div class="conta">
    Conta Demo<br><br>
    <b>R$ <span id="saldoLateral">1000</span></b><br><br>
    Status:<br>
    <b id="statusLateral">Aguardando</b>
  </div>
</div>

<div class="main">

  <div class="cards">
    <div class="card">Saldo<div class="valor">R$ <span id="saldo">1000</span></div></div>
    <div class="card">Lucro<div class="valor" id="lucro">0</div></div>
    <div class="card">Win Rate<div class="valor green" id="winrate">0%</div></div>
    <div class="card">Vitórias<div class="valor green" id="wins">0</div></div>
    <div class="card">Derrotas<div class="valor red" id="loss">0</div></div>
  </div>

  <div class="controls">
    Ativo:
    <select id="ativo" onchange="carregarGrafico()">
      <option value="BINANCE:BTCUSDT">Bitcoin BTC/USDT</option>
      <option value="BINANCE:ETHUSDT">Ethereum ETH/USDT</option>
      <option value="BINANCE:SOLUSDT">Solana SOL/USDT</option>
    </select>

    Tempo:
    <select id="tempo" onchange="carregarGrafico()">
      <option value="1">1 Minuto</option>
      <option value="3">3 Minutos</option>
      <option value="5">5 Minutos</option>
    </select>

    <button class="ligar" onclick="ligar()">▶ Ligar Robô</button>
    <button class="parar" onclick="parar()">■ Parar</button>

    <span id="status">Aguardando...</span>
  </div>

  <div class="chart-box">
    <div id="tvchart"></div>
  </div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
let saldo = 1000;
let saldoInicial = 1000;
let wins = 0;
let loss = 0;
let rodando = false;
let loop = null;

function carregarGrafico(){
  let ativo = document.getElementById("ativo").value;
  let tempo = document.getElementById("tempo").value;

  document.getElementById("tvchart").innerHTML = "";

  new TradingView.widget({
    width: "100%",
    height: 780,
    symbol: ativo,
    interval: tempo,
    timezone: "America/Sao_Paulo",
    theme: "dark",
    style: "1",
    locale: "br",
    toolbar_bg: "#000000",
    enable_publishing: false,
    hide_top_toolbar: false,
    hide_side_toolbar: false,
    hide_legend: false,
    save_image: false,
    allow_symbol_change: false,
    autosize: true,

    overrides: {
      "paneProperties.background": "#131722",
      "paneProperties.vertGridProperties.color": "#1e222d",
      "paneProperties.horzGridProperties.color": "#1e222d",

      "mainSeriesProperties.priceAxisProperties.autoScale": true,
      "mainSeriesProperties.priceAxisProperties.percentage": false,

      "mainSeriesProperties.candleStyle.drawWick": true,
      "mainSeriesProperties.candleStyle.drawBorder": false,

      "mainSeriesProperties.candleStyle.upColor": "#26a69a",
      "mainSeriesProperties.candleStyle.downColor": "#ef5350",
      "mainSeriesProperties.candleStyle.wickUpColor": "#26a69a",
      "mainSeriesProperties.candleStyle.wickDownColor": "#ef5350",

      "scalesProperties.textColor": "#AAA"
    },

    studies: [],
    container_id: "tvchart"
  });
}

function ligar(){
  if(rodando) return;

  rodando = true;
  document.getElementById("status").innerText = "Robô analisando...";
  document.getElementById("statusLateral").innerText = "Rodando";

  loop = setInterval(operar, 3000);
}

function parar(){
  rodando = false;
  clearInterval(loop);

  document.getElementById("status").innerText = "Parado";
  document.getElementById("statusLateral").innerText = "Parado";
}

function operar(){
  let entrada = Math.random() > 0.45;
  if(!entrada) return;

  let ganhou = Math.random() > 0.42;

  if(ganhou){
    saldo += 10;
    wins++;
  }else{
    saldo -= 10;
    loss++;
  }

  atualizar();
}

function atualizar(){
  let lucro = saldo - saldoInicial;

  document.getElementById("saldo").innerText = saldo;
  document.getElementById("saldoLateral").innerText = saldo;
  document.getElementById("lucro").innerText = lucro;
  document.getElementById("lucro").className = lucro >= 0 ? "valor green" : "valor red";

  document.getElementById("wins").innerText = wins;
  document.getElementById("loss").innerText = loss;

  let total = wins + loss;
  let wr = total ? ((wins / total) * 100).toFixed(1) : 0;
  document.getElementById("winrate").innerText = wr + "%";
}

window.onload = carregarGrafico;
</script>

</body>
</html>
