<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Lauro Trader</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #111, #000);
  color:white;
  display:flex;
}

/* MENU */
.sidebar {
  width:220px;
  background:#000;
  height:100vh;
  padding:20px;
  border-right:1px solid rgba(212,175,55,0.4);
}
.sidebar h2 {
  color:#d4af37;
  text-shadow:0 0 10px #d4af37;
}
.menu-item {
  margin:15px 0;
  color:#aaa;
  cursor:pointer;
}
.menu-item:hover {
  color:#d4af37;
}

/* MAIN */
.main {
  flex:1;
  padding:30px;
}

/* TOPO */
.topbar {
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.btn-top {
  background:linear-gradient(45deg,#d4af37,#ffd700);
  padding:10px 20px;
  border-radius:8px;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

/* METRICAS */
.metrics {
  display:flex;
  gap:15px;
  margin-top:20px;
}
.metric {
  background:#111;
  padding:15px;
  border-radius:10px;
  border:1px solid rgba(212,175,55,0.4);
  min-width:120px;
  text-align:center;
}

/* CARD */
.card {
  margin-top:20px;
  background:#111;
  padding:20px;
  border-radius:15px;
  border:1px solid rgba(212,175,55,0.4);
}

/* BOTÕES */
.actions {
  display:flex;
  gap:10px;
  margin-top:15px;
}
.action-btn {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:1px solid #d4af37;
  text-align:center;
  cursor:pointer;
}
.active {
  background:#d4af37;
  color:black;
}

/* LOG */
.log {
  margin-top:20px;
  height:100px;
  overflow:auto;
  background:#000;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(212,175,55,0.4);
}

</style>
</head>

<body>

<div class="sidebar">
<h2>LAURO</h2>
<div class="menu-item">📊 Dashboard</div>
<div class="menu-item">🤖 Robôs</div>
<div class="menu-item">📈 Sinais</div>
<div class="menu-item">🎓 Aulas</div>
<div class="menu-item">💎 Planos</div>
</div>

<div class="main">

<div class="topbar">
<h1>Dashboard</h1>
<div class="btn-top">+ Criar Novo Robô</div>
</div>

<div class="metrics">
<div class="metric">Saldo<br><b id="saldo">1000</b></div>
<div class="metric">Lucro<br><b id="lucro">0</b></div>
<div class="metric">Win Rate<br><b id="win">0%</b></div>
<div class="metric">Vitórias<br><b id="wins">0</b></div>
<div class="metric">Derrotas<br><b id="loss">0</b></div>
</div>

<div class="card">

<h3>Polarium (Demo)</h3>

<div class="actions">
<div class="action-btn">Logs</div>
<div class="action-btn active">Dashboard</div>
<div class="action-btn">Histórico</div>
</div>

<div class="actions">
<div class="action-btn" onclick="start()">▶ Ligar</div>
<div class="action-btn" onclick="stop()">⏹ Parar</div>
</div>

<h3 id="status">Aguardando...</h3>

<div class="log" id="log"></div>

</div>

</div>

<script>

let saldo = 1000;
let wins = 0;
let loss = 0;
let loop;
let rodando = false;

function start(){
  rodando = true;
  document.getElementById("status").innerText = "Rodando...";

  loop = setInterval(()=>{
    if(!rodando) return;

    let r = Math.random() > 0.4;

    if(r){
      saldo += 10;
      wins++;
      addLog("WIN +10");
    } else {
      saldo -= 10;
      loss++;
      addLog("LOSS -10");
    }

    atualizar();

  },2000);
}

function stop(){
  rodando = false;
  clearInterval(loop);
  document.getElementById("status").innerText = "Parado";
}

function atualizar(){
  document.getElementById("saldo").innerText = saldo;
  document.getElementById("lucro").innerText = saldo - 1000;

  let total = wins + loss;
  let pct = total ? ((wins/total)*100).toFixed(1) : 0;

  document.getElementById("win").innerText = pct + "%";
  document.getElementById("wins").innerText = wins;
  document.getElementById("loss").innerText = loss;
}

function addLog(msg){
  let log = document.getElementById("log");
  log.innerHTML = msg + "<br>" + log.innerHTML;
}

</script>

</body>
</html>
