<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LAURO TESTADOR PRO V4</title>

<style>
body{margin:0;background:#070707;color:white;font-family:Arial}
.container{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:14px}
.card{background:#111;border:1px solid #d4af37;border-radius:12px;padding:14px}
h2{color:#d4af37;margin:0 0 12px}
textarea{width:100%;height:230px;background:#000;color:#00ff66;border:1px solid #d4af37;border-radius:8px;padding:10px;font-family:monospace;box-sizing:border-box}
select,input{background:#000;color:#d4af37;border:1px solid #d4af37;padding:9px;border-radius:8px}
button{padding:11px 18px;border:none;border-radius:8px;font-weight:bold;cursor:pointer;margin:3px}
.ligar{background:#00c853;color:#000}.parar{background:#d50000;color:white}.converter{background:#d4af37;color:#000}.copy{background:#333;color:white}
.sinal{text-align:center;font-size:58px;font-weight:bold}.call{color:#00ff66}.put{color:#ff3333}.wait{color:#aaa}
canvas{width:100%;height:340px;background:#0b0b0b;border-radius:8px}
table{width:100%;font-size:13px}td{padding:5px}.win{color:#00ff66}.loss{color:red}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.85);z-index:999}
.modal-content{background:#111;border:2px solid #d4af37;border-radius:12px;width:85%;height:85%;margin:35px auto;padding:20px;box-sizing:border-box;overflow:auto}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}.close{float:right;background:#d50000;color:white}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>TESTADOR DE SCRIPT</h2>
<button class="converter" onclick="abrirConversor()">🔄 Converter Script</button><br><br>

Ativo:
<select id="ativo">
<option value="BTCUSDT">Bitcoin BTC/USDT</option>
<option value="ETHUSDT">Ethereum ETH/USDT</option>
<option value="SOLUSDT">Solana SOL/USDT</option>
</select>

Tempo:
<select id="tempo">
<option value="1m">1 minuto</option>
<option value="3m">3 minutos</option>
<option value="5m">5 minutos</option>
</select>

<br><br>
<button class="ligar" onclick="ligar()">LIGAR TESTE</button>
<button class="parar" onclick="parar()">PARAR</button>

<p>Status: <b id="status">Parado</b></p>
<p>Próximo fechamento: <b id="contador">--</b></p>
<p>Preço atual: <b id="preco">0.00</b></p>
</div>

<div class="card">
<h2>SINAL DO SCRIPT</h2>
<div id="sinal" class="sinal wait">AGUARDAR</div>
<div style="text-align:center;font-size:24px;">Força: <b id="forca">0%</b></div>
</div>

<div class="card">
<h2>GRÁFICO PRÓPRIO</h2>
<canvas id="grafico" width="900" height="340"></canvas>
</div>

<div class="card">
<h2>RESULTADO</h2>
Saldo: <b id="saldo">1000</b><br>
Lucro: <b id="lucro">0</b><br>
WinRate: <b id="wr">0%</b><br>
Wins: <b id="wins">0</b><br>
Loss: <b id="loss">0</b>
<br><br>
<button class="copy" onclick="limparTeste()">Limpar teste</button>
</div>

<div class="card">
<h2>COLE SEU SCRIPT AQUI</h2>
<textarea id="codigo">
let c1 = candles[candles.length - 1];
let c2 = candles[candles.length - 2];
let c3 = candles[candles.length - 3];

let corpo1 = Math.abs(c1.close - c1.open);
let range1 = c1.high - c1.low;

let corpo2 = Math.abs(c2.close - c2.open);
let range2 = c2.high - c2.low;

let candle1Forte = corpo1 > range1 * 0.35;
let candle2Forte = corpo2 > range2 * 0.25;

let alta1 = c1.close > c1.open;
let alta2 = c2.close > c2.open;

let baixa1 = c1.close < c1.open;
let baixa2 = c2.close < c2.open;

let rompendoAlta = c1.close > c2.high || c1.close > c3.close;
let rompendoBaixa = c1.close < c2.low || c1.close < c3.close;

if(alta1 && candle1Forte && (alta2 || rompendoAlta)){
  return "CALL";
}

if(baixa1 && candle1Forte && (baixa2 || rompendoBaixa)){
  return "PUT";
}

return "AGUARDAR";
</textarea>
</div>

<div class="card">
<h2>HISTÓRICO</h2>
<table><tbody id="hist"></tbody></table>
</div>

</div>

<div id="modal" class="modal">
<div class="modal-content">
<button class="close" onclick="fecharConversor()">X</button>
<h2>CONVERSOR DE SCRIPT</h2>

<div class="modal-grid">
<div>
<h3>Script original</h3>
<textarea id="scriptOriginal"></textarea>
<button class="converter" onclick="converterScript()">Converter</button>
</div>

<div>
<h3>Script convertido</h3>
<textarea id="scriptConvertido"></textarea>
<button class="copy" onclick="copiarConvertido()">Copiar convertido</button>
<button class="ligar" onclick="usarConvertido()">Usar no testador</button>
</div>
</div>
</div>
</div>

<script>
let saldo=1000,wins=0,loss=0,rodando=false,candles=[];
let timerAnalise=null,contadorLoop=null;
let ultimaAnaliseTime=0;
let operacaoPendente=null;
let marcacoes=[];

function tempoMs(){
  let t=document.getElementById("tempo").value;
  if(t==="1m") return 60000;
  if(t==="3m") return 180000;
  if(t==="5m") return 300000;
  return 60000;
}

function proximoFechamentoMs(){
  let agora=Date.now();
  let periodo=tempoMs();
  return Math.ceil(agora/periodo)*periodo + 2000;
}

function formatarHora(ms){
  return new Date(ms).toLocaleTimeString();
}

async function buscarCandlesFechados(){
  let ativo=document.getElementById("ativo").value;
  let tempo=document.getElementById("tempo").value;
  let url=`https://api.binance.com/api/v3/klines?symbol=${ativo}&interval=${tempo}&limit=70`;

  let resposta=await fetch(url);
  let dados=await resposta.json();
  let agora=Date.now();

  let lista=dados.map(c=>({
    time:c[0],
    closeTime:c[6],
    open:parseFloat(c[1]),
    high:parseFloat(c[2]),
    low:parseFloat(c[3]),
    close:parseFloat(c[4])
  }));

  candles=lista.filter(c=>c.closeTime < agora);

  let ultimo=candles[candles.length-1];
  if(ultimo) document.getElementById("preco").innerText=ultimo.close.toFixed(2);

  desenharGrafico();
}

function executarScript(){
  try{
    let codigo=document.getElementById("codigo").value;
    let funcao=new Function("candles",codigo);
    let sinal=funcao(candles);

    if(sinal!=="CALL" && sinal!=="PUT" && sinal!=="AGUARDAR") sinal="AGUARDAR";

    mostrarSinal(sinal);
    return sinal;
  }catch(e){
    document.getElementById("status").innerText="Erro no script";
    console.log(e);
    return "AGUARDAR";
  }
}

function mostrarSinal(sinal){
  let el=document.getElementById("sinal");
  el.innerText=sinal;
  el.className="sinal "+(sinal==="CALL"?"call":sinal==="PUT"?"put":"wait");

  let forca=sinal==="AGUARDAR"?0:Math.floor(60+Math.random()*35);
  document.getElementById("forca").innerText=forca+"%";
}

function desenharGrafico(){
  let canvas=document.getElementById("grafico");
  let ctx=canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="#0b0b0b";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if(candles.length<5) return;

  let margemTopo=25;
  let margemBaixo=35;
  let margemDir=70;
  let largura=canvas.width-margemDir;
  let altura=canvas.height-margemTopo-margemBaixo;

  let max=Math.max(...candles.map(c=>c.high));
  let min=Math.min(...candles.map(c=>c.low));
  let folga=(max-min)*0.12;
  max+=folga;
  min-=folga;

  function y(preco){
    return margemTopo + altura - ((preco-min)/(max-min))*altura;
  }

  function x(i){
    return (largura/candles.length)*i + (largura/candles.length)/2;
  }

  // grid
  ctx.strokeStyle="#222";
  ctx.lineWidth=1;
  for(let i=0;i<=6;i++){
    let yy=margemTopo+(altura/6)*i;
    ctx.beginPath();
    ctx.moveTo(0,yy);
    ctx.lineTo(largura,yy);
    ctx.stroke();

    let preco=max-((max-min)/6)*i;
    ctx.fillStyle="#aaa";
    ctx.font="11px Arial";
    ctx.fillText(preco.toFixed(2),largura+5,yy+4);
  }

  for(let i=0;i<=10;i++){
    let xx=(largura/10)*i;
    ctx.beginPath();
    ctx.moveTo(xx,margemTopo);
    ctx.lineTo(xx,margemTopo+altura);
    ctx.stroke();
  }

  let candleW=Math.max(5,(largura/candles.length)*0.55);

  candles.forEach((c,i)=>{
    let xx=x(i);
    let yo=y(c.open);
    let yc=y(c.close);
    let yh=y(c.high);
    let yl=y(c.low);

    let alta=c.close>=c.open;
    let cor=alta?"#00c087":"#ff3b3b";

    ctx.strokeStyle=cor;
    ctx.fillStyle=cor;
    ctx.lineWidth=1.5;

    ctx.beginPath();
    ctx.moveTo(xx,yh);
    ctx.lineTo(xx,yl);
    ctx.stroke();

    let corpoY=Math.min(yo,yc);
    let corpoH=Math.abs(yc-yo);
    if(corpoH<3) corpoH=3;

    ctx.fillRect(xx-candleW/2,corpoY,candleW,corpoH);
  });

  // linha preço atual
  let ultimo=candles[candles.length-1];
  let yAtual=y(ultimo.close);

  ctx.strokeStyle="#00c087";
  ctx.setLineDash([4,4]);
  ctx.beginPath();
  ctx.moveTo(0,yAtual);
  ctx.lineTo(largura,yAtual);
  ctx.stroke();
  ctx.setLineDash([]);

  ctx.fillStyle="#00c087";
  ctx.fillRect(largura+5,yAtual-11,62,22);
  ctx.fillStyle="#fff";
  ctx.font="11px Arial";
  ctx.fillText(ultimo.close.toFixed(2),largura+9,yAtual+4);

  // marcações no candle exato
  marcacoes.forEach(m=>{
    let idx=candles.findIndex(c=>c.closeTime===m.closeTime);
    if(idx<0) return;

    let c=candles[idx];
    let xx=x(idx);

    let yy=m.sinal==="CALL" ? y(c.low)+18 : y(c.high)-18;
    let cor=m.sinal==="CALL" ? "#00ff00" : "#ff0000";

    ctx.fillStyle=cor;
    ctx.strokeStyle="#000";
    ctx.lineWidth=2;

    ctx.beginPath();
    if(m.sinal==="CALL"){
      ctx.moveTo(xx,yy-16);
      ctx.lineTo(xx-10,yy+6);
      ctx.lineTo(xx+10,yy+6);
    }else{
      ctx.moveTo(xx,yy+16);
      ctx.lineTo(xx-10,yy-6);
      ctx.lineTo(xx+10,yy-6);
    }
    ctx.closePath();
    ctx.fill();
    ctx.stroke();

    ctx.font="bold 11px Arial";
    ctx.fillStyle=cor;
    ctx.fillText(m.sinal,xx-16,m.sinal==="CALL"?yy+22:yy-14);

    if(m.resultado){
      ctx.fillStyle=m.resultado==="WIN"?"#00ff00":"#ff0000";
      ctx.fillText(m.resultado,xx-15,m.sinal==="CALL"?yy+36:yy-28);
    }
  });
}

function avaliarPendente(candleFechado){
  if(!operacaoPendente) return;

  let resultado="LOSS";

  if(operacaoPendente.sinal==="CALL" && candleFechado.close > operacaoPendente.precoEntrada) resultado="WIN";
  if(operacaoPendente.sinal==="PUT" && candleFechado.close < operacaoPendente.precoEntrada) resultado="WIN";

  if(resultado==="WIN"){saldo+=10;wins++}
  else{saldo-=10;loss++}

  let marc=marcacoes.find(m=>m.id===operacaoPendente.id);
  if(marc) marc.resultado=resultado;

  addHist(
    operacaoPendente.horaEntrada,
    operacaoPendente.sinal,
    resultado,
    operacaoPendente.precoEntrada,
    candleFechado.close
  );

  operacaoPendente=null;
  atualizar();
  desenharGrafico();
}

async function cicloReal(){
  await buscarCandlesFechados();
  if(candles.length<5) return;

  let ultimo=candles[candles.length-1];

  if(ultimo.closeTime===ultimaAnaliseTime) return;
  ultimaAnaliseTime=ultimo.closeTime;

  avaliarPendente(ultimo);

  let sinal=executarScript();

  if(sinal==="CALL" || sinal==="PUT"){
    let id=Date.now();

    marcacoes.push({
      id:id,
      closeTime:ultimo.closeTime,
      sinal:sinal,
      resultado:null
    });

    if(marcacoes.length>30) marcacoes.shift();

    operacaoPendente={
      id:id,
      sinal:sinal,
      precoEntrada:ultimo.close,
      horaEntrada:formatarHora(ultimo.closeTime)
    };

    desenharGrafico();
  }else{
    addHist(formatarHora(ultimo.closeTime),"AGUARDAR","SEM ENTRADA",ultimo.close,ultimo.close);
  }

  agendarProxima();
}

function agendarProxima(){
  clearTimeout(timerAnalise);
  let proximo=proximoFechamentoMs();
  timerAnalise=setTimeout(cicloReal,proximo-Date.now());
}

function iniciarContador(){
  clearInterval(contadorLoop);
  contadorLoop=setInterval(()=>{
    let falta=Math.max(0,Math.ceil((proximoFechamentoMs()-Date.now())/1000));
    document.getElementById("contador").innerText=falta+"s";
  },1000);
}

function addHist(hora,sinal,resultado,entrada,saida){
  let cor=resultado==="WIN"?"win":resultado==="LOSS"?"loss":"";

  document.getElementById("hist").innerHTML=
  `<tr>
    <td>${hora}</td>
    <td>${document.getElementById("ativo").value}</td>
    <td>${document.getElementById("tempo").value}</td>
    <td>${sinal}</td>
    <td>${entrada.toFixed(2)} → ${saida.toFixed(2)}</td>
    <td class="${cor}">${resultado}</td>
  </tr>`+document.getElementById("hist").innerHTML;
}

function atualizar(){
  document.getElementById("saldo").innerText=saldo;
  document.getElementById("lucro").innerText=saldo-1000;
  document.getElementById("wins").innerText=wins;
  document.getElementById("loss").innerText=loss;

  let total=wins+loss;
  let wr=total?((wins/total)*100).toFixed(1):0;
  document.getElementById("wr").innerText=wr+"%";
}

function ligar(){
  if(rodando) return;

  rodando=true;
  document.getElementById("status").innerText="Rodando no fechamento real do candle";

  cicloReal();
  iniciarContador();
}

function parar(){
  rodando=false;
  clearTimeout(timerAnalise);
  clearInterval(contadorLoop);
  document.getElementById("status").innerText="Parado";
  document.getElementById("contador").innerText="--";
}

function limparTeste(){
  saldo=1000;
  wins=0;
  loss=0;
  operacaoPendente=null;
  marcacoes=[];
  document.getElementById("hist").innerHTML="";
  mostrarSinal("AGUARDAR");
  atualizar();
  desenharGrafico();
}

/* CONVERSOR */
function abrirConversor(){document.getElementById("modal").style.display="block"}
function fecharConversor(){document.getElementById("modal").style.display="none"}

function converterScript(){
  let original=document.getElementById("scriptOriginal").value;
  let convertido="";

  if(original.includes("instrument") || original.includes("plot_shape")){
    convertido=converterAvalon();
  }else if(original.includes("return") || original.includes("candles")){
    convertido=original;
  }else{
    convertido=gerarPadrao();
  }

  document.getElementById("scriptConvertido").value=convertido;
}

function converterAvalon(){
return `
let c1 = candles[candles.length - 1];
let c2 = candles[candles.length - 2];
let c3 = candles[candles.length - 3];

let corpo1 = Math.abs(c1.close - c1.open);
let range1 = c1.high - c1.low;

let corpo2 = Math.abs(c2.close - c2.open);
let range2 = c2.high - c2.low;

let candle1Forte = corpo1 > range1 * 0.35;
let candle2Forte = corpo2 > range2 * 0.25;

let alta1 = c1.close > c1.open;
let alta2 = c2.close > c2.open;

let baixa1 = c1.close < c1.open;
let baixa2 = c2.close < c2.open;

let rompendoAlta = c1.close > c2.high || c1.close > c3.close;
let rompendoBaixa = c1.close < c2.low || c1.close < c3.close;

if(alta1 && candle1Forte && (alta2 || rompendoAlta)){
  return "CALL";
}

if(baixa1 && candle1Forte && (baixa2 || rompendoBaixa)){
  return "PUT";
}

return "AGUARDAR";
`;
}

function gerarPadrao(){
return `
let c1 = candles[candles.length - 1];
let c2 = candles[candles.length - 2];

if(c1.close > c1.open && c2.close > c2.open){
  return "CALL";
}

if(c1.close < c1.open && c2.close < c2.open){
  return "PUT";
}

return "AGUARDAR";
`;
}

function copiarConvertido(){
  let texto=document.getElementById("scriptConvertido");
  texto.select();
  document.execCommand("copy");
}

function usarConvertido(){
  document.getElementById("codigo").value=document.getElementById("scriptConvertido").value;
  fecharConversor();
}

document.getElementById("ativo").addEventListener("change",()=>{
  if(rodando){parar();ligar();}
  else buscarCandlesFechados();
});

document.getElementById("tempo").addEventListener("change",()=>{
  if(rodando){parar();ligar();}
  else buscarCandlesFechados();
});

window.addEventListener("resize",desenharGrafico);

atualizar();
buscarCandlesFechados();
</script>

</body>
</html>
