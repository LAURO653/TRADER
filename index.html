<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LAURO TRADER</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#d4af37;
display:flex;
}

/* LATERAL */
.sidebar{
width:300px;
background:#000;
border-right:3px solid #d4af37;
padding:30px;
}

.sidebar h1{
font-size:32px;
margin-bottom:30px;
}

.sidebar div{
margin:15px 0;
font-size:18px;
cursor:pointer;
}

/* MAIN */
.main{
flex:1;
padding:40px;
}

.topo{
display:flex;
justify-content:space-between;
align-items:center;
}

.btn-top{
background:#d4af37;
color:#000;
padding:10px 20px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

/* CARDS */
.cards{
display:flex;
gap:20px;
margin-top:20px;
}

.card{
border:2px solid #d4af37;
padding:20px;
border-radius:10px;
min-width:140px;
text-align:center;
}

/* BOX */
.box{
border:2px solid #d4af37;
padding:20px;
border-radius:10px;
margin-top:20px;
display:flex;
gap:20px;
}

/* GRAFICO */
.grafico{
flex:2;
}

/* HISTORICO */
.historico{
flex:1;
max-height:400px;
overflow:auto;
}

/* BOTÕES */
button{
padding:10px 20px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.ligar{background:#00c853;color:#000;}
.parar{background:#ff1744;color:#fff;}

</style>

</head>

<body>

<div class="sidebar">
<h1>LAURO</h1>

<div>📊 Dashboard</div>
<div>🤖 Robôs</div>
<div>📈 Sinais</div>
<div>🎓 Aulas</div>
<div>💎 Planos</div>

<br><br>

<div style="border:2px solid #d4af37;padding:15px;">
Conta Demo<br>
R$ <span id="saldo2">1000</span>
</div>

</div>

<div class="main">

<div class="topo">
<h1>Dashboard</h1>
<button class="btn-top">+ Criar Novo Robô</button>
</div>

<div class="cards">
<div class="card">Saldo<br><span id="saldo">1000</span></div>
<div class="card">Lucro<br><span id="lucro">0</span></div>
<div class="card">Win Rate<br><span id="win">0%</span></div>
<div class="card">Vitórias<br><span id="wins">0</span></div>
<div class="card">Derrotas<br><span id="loss">0</span></div>
</div>

<br>

<input id="ativo" value="EUR/USD">
Preço: <span id="preco">0.00000</span>

<br><br>

<button class="ligar" onclick="start()">Ligar</button>
<button class="parar" onclick="stop()">Parar</button>

<div class="box">

<div class="grafico">
<h3>Gráfico de Desempenho</h3>
<canvas id="grafico"></canvas>
</div>

<div class="historico">
<h3>Últimas Operações</h3>
<table id="tabela"></table>
</div>

</div>

</div>

<script>

let saldo=1000;
let wins=0;
let loss=0;
let grafico;
let loop;

/* PREÇO */
async function getPreco(){
let r=await fetch("https://api.exchangerate.host/latest?base=EUR&symbols=USD");
let d=await r.json();
return d.rates.USD;
}

/* IA */
function IA(){
return Math.random()<0.6;
}

/* START */
function start(){

loop=setInterval(async()=>{

let preco=await getPreco();
document.getElementById("preco").innerText=preco.toFixed(5);

let win=IA();

if(win){
saldo+=10;
wins++;
add("WIN");
}else{
saldo-=10;
loss++;
add("LOSS");
}

update();
graf(preco);

},2000);

}

/* STOP */
function stop(){
clearInterval(loop);
}

/* UPDATE */
function update(){

document.getElementById("saldo").innerText=saldo;
document.getElementById("saldo2").innerText=saldo;
document.getElementById("lucro").innerText=saldo-1000;

let t=wins+loss;
let p=t?((wins/t)*100).toFixed(1):0;

document.getElementById("win").innerText=p+"%";
document.getElementById("wins").innerText=wins;
document.getElementById("loss").innerText=loss;

}

/* GRAFICO */
function graf(preco){

if(!grafico){
let ctx=document.getElementById("grafico");
grafico=new Chart(ctx,{
type:"line",
data:{labels:[],datasets:[{data:[],borderColor:"#d4af37",tension:0.4}]},
options:{plugins:{legend:{display:false}}}
});
}

grafico.data.labels.push("");
grafico.data.datasets[0].data.push(preco);

if(grafico.data.labels.length>30){
grafico.data.labels.shift();
grafico.data.datasets[0].data.shift();
}

grafico.update();

}

/* TABELA */
function add(r){

let cor=r=="WIN"?"lime":"red";

document.getElementById("tabela").innerHTML+=`
<tr>
<td>${new Date().toLocaleTimeString()}</td>
<td style="color:${cor}">${r}</td>
</tr>
`;

}

</script>

</body>
</html>
