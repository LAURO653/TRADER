<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Lauro Trader PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1a0025,#2d003f,#1a0025);
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:240px;
  background:linear-gradient(180deg,#1a0025,#2d003f);
  height:100vh;
  padding:20px;
  box-shadow:0 0 20px rgba(255,0,255,0.2);
}

.logo{
  font-size:26px;
  font-weight:bold;
  color:#ff00ff;
  margin-bottom:30px;
}

.menu{
  margin-top:20px;
}

.menu div{
  margin:15px 0;
  cursor:pointer;
  color:#ccc;
  transition:0.3s;
}
.menu div:hover{
  color:#ff00ff;
  transform:translateX(5px);
}

/* MAIN */
.main{
  flex:1;
  padding:30px;
}

/* TOPO */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.btn-top{
  background:#ff00ff;
  padding:10px 20px;
  border-radius:10px;
  cursor:pointer;
}

/* CARD */
.card{
  margin-top:20px;
  background:linear-gradient(145deg,#2a003a,#1a0025);
  padding:20px;
  border-radius:20px;
  box-shadow:0 0 30px rgba(255,0,255,0.3);
}

/* METRICS */
.metrics{
  display:flex;
  gap:10px;
  margin-top:15px;
}
.metric{
  flex:1;
  background:#1a0025;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* BOTÕES */
.tabs{
  display:flex;
  gap:10px;
  margin-top:15px;
}
.tab{
  flex:1;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  background:#1a0025;
}
.active{
  background:#ff00ff;
  color:black;
}

/* CONTROLES */
.controls{
  display:flex;
  gap:10px;
  margin-top:15px;
}
.btn{
  flex:1;
  padding:10px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}
.start{background:#00ff99;color:black;}
.stop{background:#ff0033;color:white;}

/* LOG */
.log{
  margin-top:20px;
  background:#000;
  height:120px;
  overflow:auto;
  border-radius:10px;
  padding:10px;
}

/* GRÁFICO */
canvas{
  margin-top:20px;
}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">RAYA TRADER</div>

<div class="menu">
<div>📊 Dashboard</div>
<div>🤖 Robôs</div>
<div>📈 Sinais</div>
<div>🎓 Aulas</div>
<div>💎 Planos</div>
</div>
</div>

<div class="main">

<div class="top">
<h1>Dashboard</h1>
<div class="btn-top">Criar Novo Robô</div>
</div>

<div class="card">

<h3>Polarium (Demo)</h3>

<div class="metrics">
<div class="metric">Saldo<br><b id="saldo">1000</b></div>
<div class="metric">Lucro<br><b id="lucro">0</b></div>
<div class="metric">Win Rate<br><b id="win">0%</b></div>
<div class="metric">Vitórias<br><b id="wins">0</b></div>
<div class="metric">Derrotas<br><b id="loss">0</b></div>
</div>

<div class="tabs">
<div class="tab">Logs</div>
<div class="tab active">Dashboard</div>
<div class="tab">Histórico</div>
</div>

<div class="controls">
<div class="btn start" onclick="start()">▶ Ligar</div>
<div class="btn stop" onclick="stop()">■ Parar</div>
</div>

<h3 id="status">Aguardando...</h3>

<canvas id="grafico"></canvas>

<div class="log" id="log"></div>

</div>

</div>

<script>

let saldo=1000;
let wins=0;
let loss=0;
let loop;
let grafico;

function iniciarGrafico(){
const ctx=document.getElementById('grafico');

grafico=new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
data:[],
borderColor:'#ff00ff',
backgroundColor:'rgba(255,0,255,0.2)',
tension:0.4
}]
},
options:{
plugins:{legend:{display:false}},
scales:{x:{display:false}}
}
});
}

function start(){
document.getElementById("status").innerText="Rodando...";

loop=setInterval(()=>{
let r=Math.random()>0.45;

if(r){
saldo+=10;
wins++;
log("WIN +10");
}else{
saldo-=10;
loss++;
log("LOSS -10");
}

update();
updateChart();

},2000);
}

function stop(){
clearInterval(loop);
document.getElementById("status").innerText="Parado";
}

function update(){
document.getElementById("saldo").innerText=saldo;
document.getElementById("lucro").innerText=saldo-1000;

let total=wins+loss;
let pct=total?((wins/total)*100).toFixed(1):0;

document.getElementById("win").innerText=pct+"%";
document.getElementById("wins").innerText=wins;
document.getElementById("loss").innerText=loss;
}

function updateChart(){
grafico.data.labels.push("");
grafico.data.datasets[0].data.push(saldo);

if(grafico.data.labels.length>20){
grafico.data.labels.shift();
grafico.data.datasets[0].data.shift();
}

grafico.update();
}

function log(txt){
document.getElementById("log").innerHTML=txt+"<br>"+document.getElementById("log").innerHTML;
}

window.onload=iniciarGrafico;

</script>

</body>
</html>
