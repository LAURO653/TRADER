<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Robô Trader PRO</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#1e0033,#3a0057);
  color:white;
  text-align:center;
}

.card {
  background:#1e1e2f;
  width:380px;
  margin:80px auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.stats {
  display:flex;
  justify-content:space-around;
  margin-top:15px;
}

.box {
  background:#111;
  padding:10px;
  border-radius:10px;
  width:70px;
}

input, textarea {
  width:90%;
  padding:10px;
  margin:10px;
  border:none;
  border-radius:8px;
}

button {
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.start { background:#00ff88; color:black; }
.stop { background:red; color:white; }

.log {
  margin-top:20px;
  background:#111;
  height:120px;
  overflow:auto;
  padding:10px;
  border-radius:10px;
  text-align:left;
  font-size:12px;
}
</style>

</head>

<body>

<h1>🚀 Robô Trader PRO</h1>

<div class="card">

<h3>Conta Demo</h3>

<div class="stats">
<div class="box">Saldo<br><b id="saldo">1000</b></div>
<div class="box">Lucro<br><b id="lucro">0</b></div>
<div class="box">Win<br><b id="win">0%</b></div>
</div>

<div class="stats">
<div class="box">Win<br><b id="wins">0</b></div>
<div class="box">Loss<br><b id="loss">0</b></div>
</div>

<input id="ativo" placeholder="Digite o ativo">
<textarea id="script" placeholder="Cole seu script aqui"></textarea>

<button class="start" onclick="start()">Ligar Robô</button>
<button class="stop" onclick="stop()">Desligar</button>

<h3 id="status">Aguardando...</h3>

<div class="log" id="log"></div>

</div>

<script>

let saldo = 1000;
let wins = 0;
let loss = 0;
let rodando = false;
let loop;

function start(){
  let ativo = document.getElementById("ativo").value;
  let script = document.getElementById("script").value;

  if(!ativo || !script){
    alert("Preencha tudo!");
    return;
  }

  rodando = true;
  document.getElementById("status").innerText = "Robô ativo";

  loop = setInterval(()=>{
    if(!rodando) return;

    let resultado = Math.random() > 0.4;

    if(resultado){
      saldo += 10;
      wins++;
      addLog("WIN +10");
    } else {
      saldo -= 10;
      loss++;
      addLog("LOSS -10");
    }

    atualizar();

  },2000);
}

function stop(){
  rodando = false;
  clearInterval(loop);
  document.getElementById("status").innerText = "Parado";
}

function atualizar(){
  document.getElementById("saldo").innerText = saldo;
  document.getElementById("lucro").innerText = saldo - 1000;

  let total = wins + loss;
  let porcentagem = total ? ((wins/total)*100).toFixed(1) : 0;

  document.getElementById("win").innerText = porcentagem + "%";
  document.getElementById("wins").innerText = wins;
  document.getElementById("loss").innerText = loss;
}

function addLog(msg){
  let log = document.getElementById("log");
  log.innerHTML = msg + "<br>" + log.innerHTML;
}

</script>

</body>
</html>
