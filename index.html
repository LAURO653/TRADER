<script>

let saldo=1000;
let wins=0;
let loss=0;
let loop;
let grafico;

let historicoPreco=[];

/* ================= PREÇO ================= */
async function getPreco(ativo){

try{

if(!ativo.includes("/")) return null;

let base = ativo.split("/")[0];
let quote = ativo.split("/")[1];

let url = `https://api.exchangerate.host/latest?base=${base}&symbols=${quote}`;

let res = await fetch(url);
let data = await res.json();

return data.rates[quote];

}catch(e){
console.log("erro preço");
return null;
}

}

/* ================= GRAFICO ================= */
function iniciarGrafico(){

let ctx=document.getElementById('grafico');

if(!ctx) return;

grafico=new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
data:[],
borderColor:'#d4af37',
borderWidth:2,
tension:0.4
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
x:{display:false},
y:{ticks:{color:'#d4af37'}}
}
}
});

}

/* ================= IA ================= */
function analisarIA(){

if(historicoPreco.length < 5) return null;

let p1 = historicoPreco.at(-1);
let p2 = historicoPreco.at(-2);
let p3 = historicoPreco.at(-3);
let p4 = historicoPreco.at(-4);

let tendenciaAlta = p1 > p2 && p2 > p3;
let tendenciaBaixa = p1 < p2 && p2 < p3;

let movimento = Math.abs(p1 - p4);

if(movimento < 0.0005) return null;

let prob = movimento * 100000;

if(prob > 95) prob = 95;
if(prob < 55) return null;

if(tendenciaAlta) return {acao:"CALL", prob:prob};
if(tendenciaBaixa) return {acao:"PUT", prob:prob};

return null;
}

/* ================= START ================= */
function start(){

clearInterval(loop);

loop=setInterval(async ()=>{

let ativo=document.getElementById("ativo").value;

let preco = await getPreco(ativo);

if(!preco) return;

/* mostrar preço */
let precoEl=document.getElementById("preco");
if(precoEl) precoEl.innerText = preco.toFixed(5);

/* histórico */
historicoPreco.push(preco);
if(historicoPreco.length>50) historicoPreco.shift();

/* IA */
let sinal = analisarIA();

if(sinal){

let r = Math.random() < (sinal.prob/100);

let hora=new Date().toLocaleTimeString();

if(r){
saldo+=10;
wins++;
addTabela(hora,ativo,"WIN");
}else{
saldo-=10;
loss++;
addTabela(hora,ativo,"LOSS");
}

}

/* atualizar */
update();
updateChart(preco);

},2000);
}

/* ================= STOP ================= */
function stop(){
clearInterval(loop);
}

/* ================= UPDATE ================= */
function update(){

let saldoEl=document.getElementById("saldo");
let saldo2El=document.getElementById("saldo2");
let lucroEl=document.getElementById("lucro");

if(saldoEl) saldoEl.innerText=saldo;
if(saldo2El) saldo2El.innerText=saldo;
if(lucroEl) lucroEl.innerText=saldo-1000;

let total=wins+loss;
let pct=total?((wins/total)*100).toFixed(1):0;

let winEl=document.getElementById("win");
let winsEl=document.getElementById("wins");
let lossEl=document.getElementById("loss");

if(winEl) winEl.innerText=pct+"%";
if(winsEl) winsEl.innerText=wins;
if(lossEl) lossEl.innerText=loss;

}

/* ================= GRAFICO ================= */
function updateChart(preco){

if(!grafico) return;

grafico.data.labels.push("");
grafico.data.datasets[0].data.push(preco);

if(grafico.data.labels.length>40){
grafico.data.labels.shift();
grafico.data.datasets[0].data.shift();
}

grafico.update();
}

/* ================= TABELA ================= */
function addTabela(h,a,r){

let tabela=document.getElementById("tabela");
if(!tabela) return;

let linha=`
<tr>
<td>${h}</td>
<td>${a}</td>
<td style="color:${r=="WIN"?"lime":"red"}">${r}</td>
</tr>
`;

tabela.innerHTML+=linha;

}

window.onload=iniciarGrafico;

</script>
