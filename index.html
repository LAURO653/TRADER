<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Robô Trader PRO</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background: linear-gradient(135deg,#1e0033,#3a0057);
  color:white;
  text-align:center;
}

.container {
  margin-top:80px;
}

.card {
  background:#1e1e2f;
  width:350px;
  margin:auto;
  padding:20px;
  border-radius:15px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h1 {
  margin-bottom:30px;
}

input, textarea {
  width:90%;
  padding:10px;
  margin:10px;
  border:none;
  border-radius:8px;
}

button {
  background:#00ff88;
  color:black;
  padding:10px 20px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

button:hover {
  background:#00cc6a;
}

.status {
  margin-top:20px;
}

.stats {
  display:flex;
  justify-content:space-around;
  margin-top:20px;
}

.box {
  background:#111;
  padding:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<h1>🚀 Robô Trader PRO</h1>

<div class="container">

<div class="card">

<h3>Conta Demo</h3>

<div class="stats">
<div class="box">Saldo<br><b id="saldo">R$1000</b></div>
<div class="box">Win Rate<br><b id="win">0%</b></div>
</div>

<input id="ativo" placeholder="Digite o ativo">

<textarea id="script" placeholder="Cole seu script aqui"></textarea>

<button onclick="executar()">Iniciar Robô</button>

<h2 class="status" id="status">Aguardando...</h2>

</div>

</div>

<script>

let wins = 0;
let total = 0;

function executar() {
  let ativo = document.getElementById("ativo").value;
  let script = document.getElementById("script").value;

  if(!ativo || !script){
    document.getElementById("status").innerText = "Preencha tudo!";
    return;
  }

  document.getElementById("status").innerText = "Operando em " + ativo;

  setInterval(()=>{
    total++;
    let resultado = Math.random() > 0.4;

    if(resultado){
      wins++;
      document.getElementById("saldo").innerText = "R$ " + (1000 + wins*10);
    }

    let porcentagem = ((wins/total)*100).toFixed(1);
    document.getElementById("win").innerText = porcentagem + "%";

  },2000);
}

</script>

</body>
</html>
