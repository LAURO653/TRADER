<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LAURO TRADER PRO</title>

<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>

<style>
body{margin:0;background:#050505;color:white;font-family:Arial;display:flex}
.sidebar{width:260px;min-height:100vh;background:#050505;border-right:2px solid #d4af37;padding:25px;box-sizing:border-box}
.logo{font-size:34px;color:#d4af37;font-weight:bold;margin-bottom:35px}
.menu div{margin:18px 0;font-size:18px;color:#ddd}
.conta{margin-top:70px;border:1px solid #d4af37;border-radius:12px;padding:20px;background:#080808}
.main{flex:1;padding:22px}
.top{display:flex;justify-content:space-between;align-items:center}
.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;margin-top:18px}
.card{background:#080808;border:1px solid #d4af37;border-radius:12px;padding:15px}
.valor{font-size:19px;font-weight:bold}
.green{color:#00ff66}.red{color:red}
.controls{margin-top:18px;border:1px solid #d4af37;border-radius:12px;padding:15px;background:#080808;display:flex;align-items:center;gap:12px}
select{background:#111;color:#d4af37;border:1px solid #d4af37;padding:12px;border-radius:8px;font-weight:bold}
button{border:0;padding:12px 28px;border-radius:8px;font-weight:bold;cursor:pointer}
.ligar{background:#00b050;color:white}.parar{background:#c00000;color:white}
.chart-box{margin-top:18px;border:1px solid #d4af37;border-radius:14px;background:#101114;overflow:hidden;height:650px}
#chart{height:650px;width:100%}
.table-box{margin-top:18px;border:1px solid #d4af37;border-radius:12px;padding:15px;background:#080808;max-height:160px;overflow:auto}
table{width:100%;font-size:13px}td{padding:6px}
.win{color:#00ff66}.loss{color:red}.neutro{color:#aaa}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">LAURO</div>
  <div class="menu">
    <div>📊 Dashboard</div>
    <div>🤖 Robôs</div>
    <div>📈 Sinais</div>
    <div>🎓 Aulas</div>
    <div>💎 Planos</div>
  </div>

  <div class="conta">
    Conta Demo<br><br>
    <b>R$ <span id="saldoLateral">1000</span></b><br><br>
    Status:<br>
    <b id="statusLateral">Aguardando</b>
  </div>
</div>

<div class="main">

  <div class="top">
    <h1>Dashboard</h1>
  </div>

  <div class="cards">
    <div class="card">Saldo<div class="valor">R$ <span id="saldo">1000</span></div></div>
    <div class="card">Lucro<div class="valor" id="lucro">0</div></div>
    <div class="card">Win Rate<div class="valor green" id="winrate">0%</div></div>
    <div class="card">Vitórias<div class="valor green" id="wins">0</div></div>
    <div class="card">Derrotas<div class="valor red" id="loss">0</div></div>
  </div>

  <div class="controls">
    Ativo:
    <select id="ativo" onchange="carregarCandles()">
      <option value="BTCUSDT">Bitcoin BTC/USDT</option>
      <option value="ETHUSDT">Ethereum ETH/USDT</option>
      <option value="BNBUSDT">BNB/USDT</option>
      <option value="SOLUSDT">Solana SOL/USDT</option>
    </select>

    Tempo:
    <select id="tempo" onchange="carregarCandles()">
      <option value="1m">1 Minuto</option>
      <option value="5m">5 Minutos</option>
    </select>

    <button class="ligar" onclick="ligar()">▶ Ligar Robô</button>
    <button class="parar" onclick="parar()">■ Parar</button>

    <span id="status">Aguardando...</span>
  </div>

  <div class="chart-box">
    <div id="chart"></div>
  </div>

  <div class="table-box">
    <b>Últimas Operações</b>
    <table><tbody id="historico"></tbody></table>
  </div>

</div>

<script>
let saldo=1000;
let saldoInicial=1000;
let wins=0;
let loss=0;
let rodando=false;
let loop=null;
let chart;
let candleSeries;

function criarGrafico(){
  document.getElementById("chart").innerHTML="";

  chart = LightweightCharts.createChart(document.getElementById("chart"), {
    width: document.getElementById("chart").clientWidth,
    height: 650,
    layout: {
      background: { color: "#101114" },
      textColor: "#d1d4dc"
    },
    grid: {
      vertLines: { color: "#2a2d33" },
      horzLines: { color: "#2a2d33" }
    },
    timeScale: {
      timeVisible: true,
      secondsVisible: false,
      borderColor: "#333",
      barSpacing: 13,
      rightOffset: 8
    },
    rightPriceScale: {
      borderColor: "#333"
    },
    crosshair: {
      mode: LightweightCharts.CrosshairMode.Normal
    }
  });

  candleSeries = chart.addCandlestickSeries({
    upColor: "#55c044",
    downColor: "#ff2f3a",
    borderUpColor: "#55c044",
    borderDownColor: "#ff2f3a",
    wickUpColor: "#55c044",
    wickDownColor: "#ff2f3a"
  });
}

async function carregarCandles(){
  try{
    if(!chart || !candleSeries){
      criarGrafico();
    }

    let ativo=document.getElementById("ativo").value;
    let tempo=document.getElementById("tempo").value;

    let url=`https://api.binance.com/api/v3/klines?symbol=${ativo}&interval=${tempo}&limit=90`;
    let resposta=await fetch(url);
    let dados=await resposta.json();

    let candles=dados.map(c=>({
      time: Math.floor(c[0]/1000),
      open: parseFloat(c[1]),
      high: parseFloat(c[2]),
      low: parseFloat(c[3]),
      close: parseFloat(c[4])
    }));

    candleSeries.setData(candles);
    chart.timeScale().fitContent();

    setTimeout(()=>{
      chart.timeScale().applyOptions({
        barSpacing: 13,
        rightOffset: 8
      });
    },200);

  }catch(e){
    document.getElementById("status").innerText="Erro ao carregar candles";
  }
}

function ligar(){
  if(rodando) return;

  rodando=true;
  document.getElementById("status").innerText="Robô analisando...";
  document.getElementById("statusLateral").innerText="Rodando";

  carregarCandles();
  loop=setInterval(()=>{
    carregarCandles();
    operar();
  },5000);
}

function parar(){
  rodando=false;
  clearInterval(loop);
  document.getElementById("status").innerText="Parado";
  document.getElementById("statusLateral").innerText="Parado";
}

function operar(){
  let ativoTexto=document.getElementById("ativo").options[document.getElementById("ativo").selectedIndex].text;

  let entrada=Math.random()>0.45;

  if(!entrada){
    addHistorico(ativoTexto,"AGUARDAR","neutro");
    return;
  }

  let direcao=Math.random()>0.5?"CALL":"PUT";
  let ganhou=Math.random()>0.42;

  if(ganhou){
    saldo+=10;
    wins++;
    addHistorico(ativoTexto,direcao+" WIN","win");
  }else{
    saldo-=10;
    loss++;
    addHistorico(ativoTexto,direcao+" LOSS","loss");
  }

  atualizar();
}

function atualizar(){
  let lucro=saldo-saldoInicial;

  document.getElementById("saldo").innerText=saldo;
  document.getElementById("saldoLateral").innerText=saldo;
  document.getElementById("lucro").innerText=lucro;

  document.getElementById("lucro").className = lucro>=0 ? "valor green" : "valor red";

  document.getElementById("wins").innerText=wins;
  document.getElementById("loss").innerText=loss;

  let total=wins+loss;
  let wr=total?((wins/total)*100).toFixed(1):0;
  document.getElementById("winrate").innerText=wr+"%";
}

function addHistorico(ativo,resultado,classe){
  let hora=new Date().toLocaleTimeString();

  document.getElementById("historico").innerHTML=
  `<tr>
    <td>${hora}</td>
    <td>${ativo}</td>
    <td class="${classe}">${resultado}</td>
  </tr>` + document.getElementById("historico").innerHTML;
}

window.onload=()=>{
  criarGrafico();
  carregarCandles();
};

window.addEventListener("resize",()=>{
  if(chart){
    chart.applyOptions({width:document.getElementById("chart").clientWidth});
  }
});
</script>

</body>
</html>
