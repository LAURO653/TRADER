<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Rayane Trader Bot</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#3a003f;
  color:white;
  display:flex;
}

/* MENU LATERAL */
.sidebar {
  width:220px;
  background:#2b0030;
  height:100vh;
  padding:20px;
}

.sidebar h2 {
  color:#ff2fa3;
}

.menu-item {
  margin:15px 0;
  cursor:pointer;
}

/* CONTEÚDO */
.main {
  flex:1;
  padding:40px;
}

/* CARD */
.card {
  background:#2e2e3f;
  width:420px;
  margin:auto;
  padding:20px;
  border-radius:15px;
}

.stats {
  display:flex;
  justify-content:space-between;
  margin-top:15px;
}

.box {
  background:#111;
  padding:10px;
  border-radius:10px;
  width:80px;
  text-align:center;
}

button {
  margin-top:10px;
  padding:10px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.green { background:#00ff88; color:black; }
.red { background:red; color:white; }

.log {
  margin-top:20px;
  background:#111;
  height:100px;
  overflow:auto;
  padding:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="sidebar">
<h2>RAY TRADER</h2>

<div class="menu-item">📊 Dashboard</div>
<div class="menu-item">🤖 Robôs</div>
<div class="menu-item">📈 Sinais</div>
<div class="menu-item">🎓 Aulas</div>
<div class="menu-item">💎 Planos</div>
</div>

<div class="main">

<h1>Dashboard</h1>

<div class="card">

<h3>Conta Demo</h3>

<div class="stats">
<div class="box">Saldo<br><b id="saldo">1000</b></div>
<div class="box">Lucro<br><b id="lucro">0</b></div>
<div class="box">Win<br><b id="win">0%</b></div>
</div>

<div class="stats">
<div class="box">Win<br><b id="wins">0</b></div>
<div class="box">Loss<br><b id="loss">0</b></div>
</div>

<button class="green" onclick="start()">Ligar</button>
<button class="red" onclick="stop()">Desligar</button>

<h3 id="status">Aguardando...</h3>

<div class="log" id="log"></div>

</div>

</div>

<script>
let saldo = 1000;
let wins = 0;
let loss = 0;
let rodando = false;
let loop;

function start(){
  rodando = true;
  document.getElementById("status").innerText = "Rodando";

  loop = setInterval(()=>{
    if(!rodando) return;

    let r = Math.random() > 0.4;

    if(r){
      saldo += 10;
      wins++;
      addLog("WIN");
    } else {
      saldo -= 10;
      loss++;
      addLog("LOSS");
    }

    atualizar();

  },2000);
}

function stop(){
  rodando = false;
  clearInterval(loop);
  document.getElementById("status").innerText = "Parado";
}

function atualizar(){
  document.getElementById("saldo").innerText = saldo;
  document.getElementById("lucro").innerText = saldo - 1000;

  let total = wins + loss;
  let pct = total ? ((wins/total)*100).toFixed(1) : 0;

  document.getElementById("win").innerText = pct + "%";
  document.getElementById("wins").innerText = wins;
  document.getElementById("loss").innerText = loss;
}

function addLog(msg){
  let log = document.getElementById("log");
  log.innerHTML = msg + "<br>" + log.innerHTML;
}
</script>

</body>
</html>
