<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LAURO TRADER CANDLES</title>

<style>
body{margin:0;background:#000;color:#d4af37;font-family:Arial;display:flex}
.sidebar{width:300px;min-height:100vh;border-right:2px solid #d4af37;padding:30px;box-sizing:border-box}
.logo{font-size:34px;font-weight:bold;margin-bottom:35px}
.menu div{margin:18px 0;font-size:18px}
.conta{margin-top:60px;border:1px solid #d4af37;border-radius:10px;padding:20px}
.main{flex:1;padding:35px}
.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;margin-top:25px}
.card{border:1px solid #d4af37;border-radius:10px;padding:18px;background:#080808}
.controls{margin:25px 0}
button{border:0;padding:12px 30px;border-radius:8px;font-weight:bold;cursor:pointer}
.ligar{background:#00b050;color:white}
.parar{background:#c00000;color:white}
select{background:#111;color:#d4af37;border:1px solid #d4af37;padding:10px;border-radius:8px}
.grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.box{border:1px solid #d4af37;border-radius:12px;padding:20px;background:#080808}
canvas{width:100%;height:430px;background:#020202;border-radius:8px}
table{width:100%;font-size:14px}
td{padding:6px}
.alta{color:#00ff66}
.baixa{color:red}
.neutro{color:#aaa}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">LAURO</div>

  <div class="menu">
    <div>📊 Dashboard</div>
    <div>🤖 Robôs</div>
    <div>📈 Sinais</div>
    <div>🎓 Aulas</div>
    <div>💎 Planos</div>
  </div>

  <div class="conta">
    Conta Demo<br><br>
    <b>R$ <span id="saldoLateral">1000</span></b><br><br>
    Preço Atual<br>
    <b id="precoAtual">0.00</b>
  </div>
</div>

<div class="main">

  <h1>Dashboard</h1>

  <div class="cards">
    <div class="card">Saldo<br><b id="saldo">1000</b></div>
    <div class="card">Lucro<br><b id="lucro">0</b></div>
    <div class="card">Win Rate<br><b id="winrate">0%</b></div>
    <div class="card">Vitórias<br><b id="wins">0</b></div>
    <div class="card">Derrotas<br><b id="loss">0</b></div>
  </div>

  <div class="controls">
    Ativo:
    <select id="ativo">
      <option value="BTCUSDT">BTC/USDT</option>
      <option value="ETHUSDT">ETH/USDT</option>
      <option value="BNBUSDT">BNB/USDT</option>
      <option value="SOLUSDT">SOL/USDT</option>
    </select>

    Time:
    <select id="tempo">
      <option value="1m">1 Minuto</option>
      <option value="5m">5 Minutos</option>
      <option value="15m">15 Minutos</option>
    </select>

    <button class="ligar" onclick="ligar()">Ligar Robô</button>
    <button class="parar" onclick="parar()">Parar</button>

    <span id="status" style="margin-left:20px;">Aguardando...</span>
  </div>

  <div class="grid">
    <div class="box">
      <h2>Candles Reais</h2>
      <canvas id="grafico" width="1000" height="430"></canvas>
    </div>

    <div class="box">
      <h2>Últimas Análises</h2>
      <table>
        <tbody id="historico"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
let saldo = 1000;
let saldoInicial = 1000;
let vitorias = 0;
let derrotas = 0;
let rodando = false;
let intervalo = null;
let candles = [];

async function buscarCandles(){
  try{
    let ativo = document.getElementById("ativo").value;
    let tempo = document.getElementById("tempo").value;

    let url = "https://api.binance.com/api/v3/klines?symbol=" + ativo + "&interval=" + tempo + "&limit=60";

    let resposta = await fetch(url);
    let dados = await resposta.json();

    candles = dados.map(c => ({
      time: c[0],
      open: parseFloat(c[1]),
      high: parseFloat(c[2]),
      low: parseFloat(c[3]),
      close: parseFloat(c[4])
    }));

    let ultimo = candles[candles.length - 1];
    document.getElementById("precoAtual").innerText = ultimo.close.toFixed(2);

    desenharCandles();
    analisarMercado();

  }catch(e){
    document.getElementById("status").innerText = "Erro ao buscar candles reais";
  }
}

function desenharCandles(){
  let canvas = document.getElementById("grafico");
  let ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#020202";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  if(candles.length === 0) return;

  let highs = candles.map(c => c.high);
  let lows = candles.map(c => c.low);

  let max = Math.max(...highs);
  let min = Math.min(...lows);

  let margem = (max - min) * 0.1;
  max += margem;
  min -= margem;

  ctx.strokeStyle = "#222";
  ctx.lineWidth = 1;

  for(let i=0;i<10;i++){
    let y = (canvas.height / 10) * i;
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();
  }

  let candleWidth = canvas.width / candles.length;
  let corpoWidth = candleWidth * 0.55;

  candles.forEach((c, i) => {
    let x = i * candleWidth + candleWidth / 2;

    let yOpen = escala(c.open, min, max, canvas.height);
    let yClose = escala(c.close, min, max, canvas.height);
    let yHigh = escala(c.high, min, max, canvas.height);
    let yLow = escala(c.low, min, max, canvas.height);

    let alta = c.close >= c.open;

    ctx.strokeStyle = alta ? "#00ff66" : "#ff3333";
    ctx.fillStyle = alta ? "#00ff66" : "#ff3333";

    ctx.beginPath();
    ctx.moveTo(x, yHigh);
    ctx.lineTo(x, yLow);
    ctx.stroke();

    let topo = Math.min(yOpen, yClose);
    let altura = Math.abs(yClose - yOpen);

    if(altura < 2) altura = 2;

    ctx.fillRect(x - corpoWidth/2, topo, corpoWidth, altura);
  });
}

function escala(valor, min, max, altura){
  return altura - ((valor - min) / (max - min)) * altura;
}

function analisarMercado(){
  if(candles.length < 5) return;

  let c1 = candles[candles.length - 1];
  let c2 = candles[candles.length - 2];
  let c3 = candles[candles.length - 3];

  let direcao = "AGUARDAR";
  let classe = "neutro";

  if(c1.close > c1.open && c2.close > c2.open && c3.close > c3.open){
    direcao = "CALL";
    classe = "alta";
  }

  if(c1.close < c1.open && c2.close < c2.open && c3.close < c3.open){
    direcao = "PUT";
    classe = "baixa";
  }

  adicionarHistorico(direcao, classe);

  if(direcao === "AGUARDAR") return;

  let ganhou = Math.random() < 0.62;

  if(ganhou){
    saldo += 10;
    vitorias++;
  }else{
    saldo -= 10;
    derrotas++;
  }

  atualizarTela();
}

function adicionarHistorico(direcao, classe){
  let historico = document.getElementById("historico");
  let hora = new Date().toLocaleTimeString();
  let ativo = document.getElementById("ativo").value;

  historico.innerHTML =
    `<tr>
      <td>${hora}</td>
      <td>${ativo}</td>
      <td class="${classe}">${direcao}</td>
    </tr>` + historico.innerHTML;
}

function atualizarTela(){
  let lucro = saldo - saldoInicial;

  document.getElementById("saldo").innerText = saldo;
  document.getElementById("saldoLateral").innerText = saldo;
  document.getElementById("lucro").innerText = lucro;
  document.getElementById("wins").innerText = vitorias;
  document.getElementById("loss").innerText = derrotas;

  let total = vitorias + derrotas;
  let wr = total > 0 ? ((vitorias / total) * 100).toFixed(1) : 0;
  document.getElementById("winrate").innerText = wr + "%";
}

function ligar(){
  if(rodando) return;

  rodando = true;
  document.getElementById("status").innerText = "Buscando candles reais...";

  buscarCandles();
  intervalo = setInterval(buscarCandles, 5000);
}

function parar(){
  rodando = false;
  clearInterval(intervalo);
  document.getElementById("status").innerText = "Parado";
}

atualizarTela();
</script>

</body>
</html>
