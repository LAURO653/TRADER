<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LAURO SIGNAL</title>

<style>
body{
  margin:0;
  background:#0b0b0b;
  color:#fff;
  font-family:Arial;
}

.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
  padding:20px;
}

.card{
  background:#111;
  border:1px solid #d4af37;
  border-radius:12px;
  padding:15px;
}

h2{
  margin:0 0 10px;
  color:#d4af37;
}

.sinal{
  text-align:center;
  font-size:60px;
  font-weight:bold;
}

.call{color:#00ff66;}
.put{color:#ff3b3b;}
.wait{color:#aaa;}

.forca{
  text-align:center;
  font-size:30px;
}

.status{
  font-size:18px;
}

button{
  padding:12px 20px;
  border:none;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.ligar{background:#00c853;color:#000;}
.parar{background:#d50000;color:#fff;}

table{
  width:100%;
  font-size:14px;
}

td{
  padding:6px;
}

.win{color:#00ff66;}
.loss{color:#ff3b3b;}
</style>
</head>

<body>

<div class="container">

<div class="card">
<h2>SINAL</h2>
<div id="sinal" class="sinal wait">AGUARDAR</div>
<div id="forca" class="forca">0%</div>
</div>

<div class="card">
<h2>CONTROLE</h2>

<div class="status">Status: <span id="status">Parado</span></div><br>

<button class="ligar" onclick="ligar()">LIGAR</button>
<button class="parar" onclick="parar()">PARAR</button>

<br><br>

Meta: <input id="meta" value="80"><br><br>
Stop: <input id="stop" value="-60">
</div>

<div class="card">
<h2>RESULTADO</h2>

Saldo: <b id="saldo">1000</b><br>
Lucro: <b id="lucro">0</b><br>
WinRate: <b id="wr">0%</b><br>
Wins: <b id="wins">0</b><br>
Loss: <b id="loss">0</b>

</div>

<div class="card">
<h2>HISTÓRICO</h2>
<table><tbody id="hist"></tbody></table>
</div>

</div>

<script>
let saldo=1000;
let wins=0;
let loss=0;
let loop;
let rodando=false;

function gerarSinal(){

  let r=Math.random();

  let sinal="AGUARDAR";
  let forca=Math.floor(Math.random()*100);

  if(r>0.65) sinal="CALL";
  else if(r<0.35) sinal="PUT";

  atualizarTela(sinal,forca);

  if(sinal!="AGUARDAR"){
    let win=Math.random()<0.6;

    if(win){
      saldo+=10;
      wins++;
      addHist(sinal,"WIN");
    }else{
      saldo-=10;
      loss++;
      addHist(sinal,"LOSS");
    }
  }

  atualizarStats();
}

function atualizarTela(sinal,forca){
  let el=document.getElementById("sinal");

  el.innerText=sinal;
  el.className="sinal "+(sinal=="CALL"?"call":sinal=="PUT"?"put":"wait");

  document.getElementById("forca").innerText=forca+"%";
}

function atualizarStats(){
  document.getElementById("saldo").innerText=saldo;
  document.getElementById("lucro").innerText=saldo-1000;

  let t=wins+loss;
  let wr=t?((wins/t)*100).toFixed(1):0;

  document.getElementById("wr").innerText=wr+"%";
  document.getElementById("wins").innerText=wins;
  document.getElementById("loss").innerText=loss;
}

function addHist(sinal,res){
  let h=document.getElementById("hist");
  let cor=res=="WIN"?"win":"loss";

  h.innerHTML=
  `<tr>
    <td>${new Date().toLocaleTimeString()}</td>
    <td>${sinal}</td>
    <td class="${cor}">${res}</td>
  </tr>`+h.innerHTML;
}

function ligar(){
  if(rodando) return;

  rodando=true;
  document.getElementById("status").innerText="Rodando";

  loop=setInterval(gerarSinal,2000);
}

function parar(){
  rodando=false;
  clearInterval(loop);
  document.getElementById("status").innerText="Parado";
}
</script>

</body>
</html>
