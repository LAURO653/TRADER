<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LAURO TRADER PRO</title>

<style>
body{
  margin:0;
  background:#080808;
  color:white;
  font-family:Arial;
  display:flex;
}

.sidebar{
  width:280px;
  min-height:100vh;
  background:#050505;
  border-right:2px solid #d4af37;
  padding:25px;
  box-sizing:border-box;
}

.logo{
  font-size:34px;
  color:#d4af37;
  font-weight:bold;
  margin-bottom:35px;
  text-shadow:0 0 12px #d4af37;
}

.menu div{
  margin:18px 0;
  font-size:18px;
  color:#ddd;
}

.conta{
  margin-top:80px;
  border:1px solid #d4af37;
  border-radius:12px;
  padding:20px;
  background:#0d0d0d;
}

.main{
  flex:1;
  padding:25px;
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.criar{
  background:#d4af37;
  color:#000;
  border:0;
  padding:14px 28px;
  border-radius:8px;
  font-weight:bold;
}

.cards{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:15px;
  margin-top:25px;
}

.card{
  background:#111;
  border:1px solid #d4af37;
  border-radius:12px;
  padding:18px;
}

.valor{
  font-size:20px;
  font-weight:bold;
  margin-top:5px;
}

.green{color:#00ff66;}
.red{color:red;}

.painel{
  margin-top:25px;
  border:1px solid #d4af37;
  border-radius:15px;
  padding:20px;
  background:#0b0b0b;
}

.controls{
  display:flex;
  gap:15px;
  margin-bottom:15px;
  align-items:center;
}

select{
  background:#111;
  color:#d4af37;
  border:1px solid #d4af37;
  padding:12px;
  border-radius:8px;
}

button{
  border:0;
  padding:12px 30px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}

.ligar{background:#00b050;color:white;}
.parar{background:#c00000;color:white;}

.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:20px;
}

.chart-box{
  border:1px solid #d4af37;
  border-radius:12px;
  overflow:hidden;
  background:#000;
}

.table-box{
  border:1px solid #d4af37;
  border-radius:12px;
  padding:15px;
  background:#050505;
  max-height:520px;
  overflow:auto;
}

table{
  width:100%;
  font-size:13px;
}

td{
  padding:7px;
}

.win{color:#00ff66;}
.loss{color:red;}
.neutro{color:#aaa;}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">LAURO</div>

  <div class="menu">
    <div>📊 Dashboard</div>
    <div>🤖 Robôs</div>
    <div>📈 Sinais</div>
    <div>🎓 Aulas</div>
    <div>💎 Planos</div>
  </div>

  <div class="conta">
    Conta Demo<br><br>
    <b>R$ <span id="saldoLateral">1000</span></b><br><br>
    Status:<br>
    <b id="statusLateral">Aguardando</b>
  </div>
</div>

<div class="main">

  <div class="top">
    <h1>Dashboard</h1>
    <button class="criar">+ Criar Novo Robô</button>
  </div>

  <div class="cards">
    <div class="card">Saldo<div class="valor">R$ <span id="saldo">1000</span></div></div>
    <div class="card">Lucro<div class="valor" id="lucro">0</div></div>
    <div class="card">Win Rate<div class="valor green" id="winrate">0%</div></div>
    <div class="card">Vitórias<div class="valor green" id="wins">0</div></div>
    <div class="card">Derrotas<div class="valor red" id="loss">0</div></div>
  </div>

  <div class="painel">

    <div class="controls">
      Ativo:
      <select id="ativo" onchange="trocarAtivo()">
        <option value="BINANCE:BTCUSDT">Bitcoin BTC/USDT</option>
        <option value="BINANCE:ETHUSDT">Ethereum ETH/USDT</option>
        <option value="BINANCE:BNBUSDT">BNB/USDT</option>
        <option value="BINANCE:SOLUSDT">Solana SOL/USDT</option>
      </select>

      <button class="ligar" onclick="ligar()">▶ Ligar Robô</button>
      <button class="parar" onclick="parar()">■ Parar</button>

      <span id="status">Aguardando...</span>
    </div>

    <div class="grid">

      <div class="chart-box">
        <div id="tvchart" style="height:520px;"></div>
      </div>

      <div class="table-box">
        <h2>Últimas Operações</h2>
        <table>
          <tbody id="historico"></tbody>
        </table>
      </div>

    </div>

  </div>

</div>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
let saldo = 1000;
let saldoInicial = 1000;
let wins = 0;
let loss = 0;
let rodando = false;
let loop = null;

function carregarGrafico(){
  let ativo = document.getElementById("ativo").value;

  document.getElementById("tvchart").innerHTML = "";

  new TradingView.widget({
    width: "100%",
    height: 520,
    symbol: ativo,
    interval: "1",
    timezone: "America/Sao_Paulo",
    theme: "dark",
    style: "1",
    locale: "br",
    toolbar_bg: "#000000",
    enable_publishing: false,
    hide_top_toolbar: false,
    hide_legend: false,
    save_image: false,
    container_id: "tvchart"
  });
}

function trocarAtivo(){
  carregarGrafico();
}

function ligar(){
  if(rodando) return;

  rodando = true;
  document.getElementById("status").innerText = "Robô analisando...";
  document.getElementById("statusLateral").innerText = "Rodando";

  loop = setInterval(operar, 2500);
}

function parar(){
  rodando = false;
  clearInterval(loop);

  document.getElementById("status").innerText = "Parado";
  document.getElementById("statusLateral").innerText = "Parado";
}

function operar(){
  let ativoTexto = document.getElementById("ativo").options[document.getElementById("ativo").selectedIndex].text;

  let entrada = Math.random() > 0.35;

  if(!entrada){
    addHistorico(ativoTexto, "AGUARDAR", "neutro");
    return;
  }

  let direcao = Math.random() > 0.5 ? "CALL" : "PUT";
  let ganhou = Math.random() > 0.42;

  if(ganhou){
    saldo += 10;
    wins++;
    addHistorico(ativoTexto, direcao + " WIN", "win");
  }else{
    saldo -= 10;
    loss++;
    addHistorico(ativoTexto, direcao + " LOSS", "loss");
  }

  atualizar();
}

function atualizar(){
  let lucro = saldo - saldoInicial;

  document.getElementById("saldo").innerText = saldo;
  document.getElementById("saldoLateral").innerText = saldo;
  document.getElementById("lucro").innerText = lucro;

  if(lucro >= 0){
    document.getElementById("lucro").className = "valor green";
  }else{
    document.getElementById("lucro").className = "valor red";
  }

  document.getElementById("wins").innerText = wins;
  document.getElementById("loss").innerText = loss;

  let total = wins + loss;
  let wr = total ? ((wins / total) * 100).toFixed(1) : 0;
  document.getElementById("winrate").innerText = wr + "%";
}

function addHistorico(ativo, resultado, classe){
  let hora = new Date().toLocaleTimeString();

  document.getElementById("historico").innerHTML =
  `<tr>
    <td>${hora}</td>
    <td>${ativo}</td>
    <td class="${classe}">${resultado}</td>
  </tr>` + document.getElementById("historico").innerHTML;
}

window.onload = carregarGrafico;
</script>

</body>
</html>
