<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LAURO TRADER</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
background:#000;
color:#d4af37;
font-family:Arial;
margin:0;
display:flex;
}

/* LATERAL */
.sidebar{
width:260px;
background:#000;
border-right:2px solid #d4af37;
padding:30px;
}

.sidebar h1{
font-size:30px;
}

.sidebar div{
margin:15px 0;
}

/* CONTEUDO */
.main{
flex:1;
padding:30px;
}

.card{
border:1px solid #d4af37;
padding:15px;
margin:10px;
border-radius:10px;
display:inline-block;
min-width:120px;
}

.box{
border:1px solid #d4af37;
padding:20px;
border-radius:10px;
margin-top:20px;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:5px;
cursor:pointer;
}

.ligar{background:green;color:#fff;}
.parar{background:red;color:#fff;}

table{
width:100%;
margin-top:10px;
}

td{
padding:5px;
}
</style>

</head>

<body>

<!-- LATERAL -->
<div class="sidebar">
<h1>LAURO</h1>

<div>📊 Dashboard</div>
<div>🤖 Robôs</div>
<div>📈 Sinais</div>
<div>🎓 Aulas</div>
<div>💎 Planos</div>

<br><br>

<div style="border:1px solid #d4af37;padding:10px;">
Conta Demo<br>
R$ <span id="saldo2">1000</span>
</div>
</div>

<!-- MAIN -->
<div class="main">

<h1>Dashboard</h1>

<div class="card">Saldo<br><span id="saldo">1000</span></div>
<div class="card">Lucro<br><span id="lucro">0</span></div>
<div class="card">Win Rate<br><span id="win">0%</span></div>
<div class="card">Vitórias<br><span id="wins">0</span></div>
<div class="card">Derrotas<br><span id="loss">0</span></div>

<br><br>

<input id="ativo" value="EUR/USD">

<br>

Preço: <span id="preco">0.00000</span>

<br><br>

<button class="ligar" onclick="start()">Ligar</button>
<button class="parar" onclick="stop()">Parar</button>

<div class="box">
<h3>Gráfico</h3>
<canvas id="grafico"></canvas>
</div>

<div class="box">
<h3>Histórico</h3>
<table id="tabela"></table>
</div>

</div>

<script>

let saldo=1000;
let wins=0;
let loss=0;
let loop;
let grafico;

let historico=[];

/* PREÇO */
async function getPreco(){
try{
let r=await fetch("https://api.exchangerate.host/latest?base=EUR&symbols=USD");
let d=await r.json();
return d.rates.USD;
}catch{
return null;
}
}

/* IA */
function IA(){
if(historico.length<5) return null;

let p1=historico.at(-1);
let p2=historico.at(-2);

if(p1>p2) return "CALL";
if(p1<p2) return "PUT";

return null;
}

/* START */
function start(){

loop=setInterval(async ()=>{

let preco=await getPreco();
if(!preco) return;

document.getElementById("preco").innerText=preco.toFixed(5);

historico.push(preco);

let sinal=IA();

if(sinal){

let r=Math.random()<0.6;

if(r){
saldo+=10;
wins++;
add("WIN");
}else{
saldo-=10;
loss++;
add("LOSS");
}

}

update();
graf(preco);

},2000);

}

/* STOP */
function stop(){
clearInterval(loop);
}

/* UPDATE */
function update(){

document.getElementById("saldo").innerText=saldo;
document.getElementById("saldo2").innerText=saldo;
document.getElementById("lucro").innerText=saldo-1000;

let t=wins+loss;
let p=t?((wins/t)*100).toFixed(1):0;

document.getElementById("win").innerText=p+"%";
document.getElementById("wins").innerText=wins;
document.getElementById("loss").innerText=loss;

}

/* GRAFICO */
function graf(preco){

if(!grafico){
let ctx=document.getElementById("grafico");
grafico=new Chart(ctx,{
type:"line",
data:{labels:[],datasets:[{data:[],borderColor:"#d4af37"}]},
options:{plugins:{legend:{display:false}}}
});
}

grafico.data.labels.push("");
grafico.data.datasets[0].data.push(preco);

if(grafico.data.labels.length>30){
grafico.data.labels.shift();
grafico.data.datasets[0].data.shift();
}

grafico.update();

}

/* TABELA */
function add(r){

let t=document.getElementById("tabela");

let cor=r=="WIN"?"lime":"red";

t.innerHTML+=`<tr><td>${new Date().toLocaleTimeString()}</td><td style="color:${cor}">${r}</td></tr>`;

}

</script>

</body>
</html>
