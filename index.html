<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LAURO TRADER</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:#fff;
    font-family:Arial;
}

#tvchart{
    width:100%;
    height:700px;
}
</style>
</head>

<body>

<div id="tvchart"></div>

<script>

new TradingView.widget({
    container_id: "tvchart",
    width: "100%",
    height: 700,

    symbol: "BINANCE:BTCUSDT",
    interval: "1",

    timezone: "America/Sao_Paulo",
    theme: "dark",
    style: "1",

    locale: "br",

    toolbar_bg: "#0b0b0b",

    hide_top_toolbar: false,
    hide_side_toolbar: false,

    autosize: true,

    overrides: {

        // FUNDO
        "paneProperties.background": "#0f0f0f",

        // GRID SUAVE
        "paneProperties.vertGridProperties.color": "#1a1a1a",
        "paneProperties.horzGridProperties.color": "#1a1a1a",

        // CANDLES PROFISSIONAIS
        "mainSeriesProperties.candleStyle.upColor": "#00c087",
        "mainSeriesProperties.candleStyle.downColor": "#ff3b3b",

        "mainSeriesProperties.candleStyle.borderUpColor": "#00c087",
        "mainSeriesProperties.candleStyle.borderDownColor": "#ff3b3b",

        "mainSeriesProperties.candleStyle.wickUpColor": "#00c087",
        "mainSeriesProperties.candleStyle.wickDownColor": "#ff3b3b",

        // ESPESSURA E ESPAÇAMENTO (ESSENCIAL)
        "mainSeriesProperties.candleStyle.barSpacing": 20,

        // ESCALA AUTOMÁTICA
        "mainSeriesProperties.priceAxisProperties.autoScale": true,

        // TEXTO
        "scalesProperties.textColor": "#AAA"
    }

});

</script>

</body>
</html>
