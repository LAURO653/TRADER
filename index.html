<script>

let saldo=1000;
let wins=0;
let loss=0;
let loop;
let grafico;

let historicoPreco=[];

/* ================= PREÇO REAL ================= */
async function getPreco(ativo){

if(!ativo.includes("/")) return 0;

let base = ativo.split("/")[0];
let quote = ativo.split("/")[1];

let url = `https://api.exchangerate.host/latest?base=${base}&symbols=${quote}`;

let res = await fetch(url);
let data = await res.json();

return data.rates[quote];
}

/* ================= GRAFICO ================= */
function iniciarGrafico(){
const ctx=document.getElementById('grafico');

grafico=new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
data:[],
borderColor:'#d4af37',
backgroundColor:'rgba(212,175,55,0.2)',
borderWidth:2,
tension:0.4
}]
},
options:{
plugins:{legend:{display:false}},
scales:{
x:{display:false},
y:{ticks:{color:'#d4af37'}}
}
}
});
}

/* ================= IA ================= */
function analisarIA(){

if(historicoPreco.length < 5) return null;

/* últimos preços */
let p1 = historicoPreco[historicoPreco.length-1];
let p2 = historicoPreco[historicoPreco.length-2];
let p3 = historicoPreco[historicoPreco.length-3];
let p4 = historicoPreco[historicoPreco.length-4];

/* direção */
let tendenciaAlta = p1 > p2 && p2 > p3;
let tendenciaBaixa = p1 < p2 && p2 < p3;

/* força */
let movimento = Math.abs(p1 - p4);

/* filtro lateral */
if(movimento < 0.0005) return null;

/* probabilidade */
let prob = (movimento * 100000).toFixed(0);

if(prob > 95) prob = 95;
if(prob < 55) return null;

/* decisão */
if(tendenciaAlta){
return {acao:"CALL", prob:prob};
}

if(tendenciaBaixa){
return {acao:"PUT", prob:prob};
}

return null;
}

/* ================= START ================= */
function start(){
loop=setInterval(async ()=>{

let ativo=document.getElementById("ativo").value;

let preco = await getPreco(ativo);

if(!preco) return;

/* mostrar preço */
document.getElementById("preco").innerText = preco.toFixed(5);

/* salvar histórico */
historicoPreco.push(preco);
if(historicoPreco.length > 50) historicoPreco.shift();

/* IA */
let sinal = analisarIA();

if(sinal){

let r = Math.random() < (sinal.prob/100);

let hora=new Date().toLocaleTimeString();

if(r){
saldo+=10;
wins++;
addTabela(hora,ativo,"WIN");
}else{
saldo-=10;
loss++;
addTabela(hora,ativo,"LOSS");
}

}

/* atualizar */
update();
updateChart(preco);

},2000);
}

/* ================= STOP ================= */
function stop(){
clearInterval(loop);
}

/* ================= UPDATE ================= */
function update(){
document.getElementById("saldo").innerText=saldo;
document.getElementById("saldo2").innerText=saldo;
document.getElementById("lucro").innerText=saldo-1000;

let total=wins+loss;
let pct=total?((wins/total)*100).toFixed(1):0;

document.getElementById("win").innerText=pct+"%";
document.getElementById("wins").innerText=wins;
document.getElementById("loss").innerText=loss;
}

/* ================= GRAFICO ================= */
function updateChart(preco){

grafico.data.labels.push("");
grafico.data.datasets[0].data.push(preco);

if(grafico.data.labels.length>40){
grafico.data.labels.shift();
grafico.data.datasets[0].data.shift();
}

grafico.update();
}

/* ================= TABELA ================= */
function addTabela(h,a,r){
let tabela=document.getElementById("tabela");

let linha=`
<tr>
<td>${h}</td>
<td>${a}</td>
<td class="${r=="WIN"?"win":"loss"}">${r}</td>
</tr>
`;

tabela.innerHTML+=linha;
}

window.onload=iniciarGrafico;

</script>
