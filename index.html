<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Lauro Trader</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family:Arial;
  background: radial-gradient(circle at top, #111, #000);
  color:white;
  display:flex;
}

/* MENU */
.sidebar {
  width:220px;
  background:#000;
  height:100vh;
  padding:20px;
  border-right:1px solid rgba(212,175,55,0.4);
}
.sidebar h2 {
  color:#d4af37;
  text-shadow:0 0 10px #d4af37;
}
.menu-item {
  margin:15px 0;
  color:#aaa;
}
.menu-item:hover {
  color:#d4af37;
}

/* MAIN */
.main {
  flex:1;
  display:flex;
  justify-content:center;
  padding:30px;
}

/* CARD */
.card {
  width:700px;
  background:#111;
  padding:25px;
  border-radius:15px;
  border:1px solid rgba(212,175,55,0.5);
  box-shadow:0 0 30px rgba(212,175,55,0.2);
}

/* METRICS */
.metrics {
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}
.metric {
  background:#000;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(212,175,55,0.5);
  width:100px;
  text-align:center;
}

/* BUTTONS */
button {
  padding:10px;
  margin:5px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.green {
  background:#d4af37;
  color:black;
}
.red {
  background:#550000;
  color:white;
}

/* LOG */
.log {
  background:#000;
  height:100px;
  margin-top:10px;
  padding:10px;
  overflow:auto;
  border-radius:10px;
  border:1px solid rgba(212,175,55,0.4);
}

canvas {
  margin-top:20px;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>LAURO</h2>
<div class="menu-item">📊 Dashboard</div>
<div class="menu-item">🤖 Robôs</div>
<div class="menu-item">📈 Sinais</div>
<div class="menu-item">🎓 Aulas</div>
<div class="menu-item">💎 Planos</div>
</div>

<div class="main">

<div class="card">

<h2>Dashboard</h2>

<div class="metrics">
<div class="metric">Saldo<br><b id="saldo">1000</b></div>
<div class="metric">Lucro<br><b id="lucro">0</b></div>
<div class="metric">Win<br><b id="win">0%</b></div>
<div class="metric">Wins<br><b id="wins">0</b></div>
<div class="metric">Loss<br><b id="loss">0</b></div>
</div>

<button class="green" onclick="start()">Ligar</button>
<button class="red" onclick="stop()">Parar</button>

<h3 id="status">Aguardando...</h3>

<canvas id="grafico"></canvas>

<div class="log" id="log"></div>

</div>

</div>

<script>

let saldo = 1000;
let wins = 0;
let loss = 0;
let loop;
let grafico;
let data = [];

function iniciarGrafico(){
  const ctx = document.getElementById('grafico');

  grafico = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        data: [],
        borderColor: '#d4af37',
        backgroundColor: 'rgba(212,175,55,0.1)',
        tension: 0.3
      }]
    },
    options: {
      plugins:{legend:{display:false}},
      scales:{
        x:{display:false},
        y:{ticks:{color:'#d4af37'}}
      }
    }
  });
}

function start(){
  document.getElementById("status").innerText="Rodando...";

  loop = setInterval(()=>{
    let r = Math.random() > 0.45;

    if(r){
      saldo+=10;
      wins++;
      log("WIN +10");
    } else {
      saldo-=10;
      loss++;
      log("LOSS -10");
    }

    atualizar();
    atualizarGrafico();

  },2000);
}

function stop(){
  clearInterval(loop);
  document.getElementById("status").innerText="Parado";
}

function atualizar(){
  document.getElementById("saldo").innerText=saldo;
  document.getElementById("lucro").innerText=saldo-1000;

  let total = wins+loss;
  let pct = total ? ((wins/total)*100).toFixed(1):0;

  document.getElementById("win").innerText=pct+"%";
  document.getElementById("wins").innerText=wins;
  document.getElementById("loss").innerText=loss;
}

function atualizarGrafico(){
  grafico.data.labels.push("");
  grafico.data.datasets[0].data.push(saldo);

  if(grafico.data.labels.length>20){
    grafico.data.labels.shift();
    grafico.data.datasets[0].data.shift();
  }

  grafico.update();
}

function log(txt){
  document.getElementById("log").innerHTML = txt+"<br>"+document.getElementById("log").innerHTML;
}

window.onload = iniciarGrafico;

</script>

</body>
</html>
