<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>LAURO TRADER PRO</title>

<style>
body{margin:0;background:#000;color:#d4af37;font-family:Arial;display:flex}
.sidebar{width:300px;min-height:100vh;border-right:2px solid #d4af37;padding:30px;box-sizing:border-box}
.logo{font-size:34px;font-weight:bold;margin-bottom:35px}
.menu div{margin:18px 0;font-size:18px}
.conta{margin-top:60px;border:1px solid #d4af37;border-radius:10px;padding:20px}
.main{flex:1;padding:35px}
.top{display:flex;justify-content:space-between;align-items:center}
.criar{background:#d4af37;color:#000;border:0;padding:12px 25px;border-radius:8px;font-weight:bold}
.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:15px;margin-top:25px}
.card{border:1px solid #d4af37;border-radius:10px;padding:18px;background:#080808}
.controls{margin:25px 0}
button{border:0;padding:12px 30px;border-radius:8px;font-weight:bold;cursor:pointer}
.ligar{background:#00b050;color:white}
.parar{background:#c00000;color:white}
select{background:#111;color:#d4af37;border:1px solid #d4af37;padding:10px;border-radius:8px}
.grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
.box{border:1px solid #d4af37;border-radius:12px;padding:20px;background:#080808}
canvas{width:100%;height:350px;background:#020202;border-radius:8px}
table{width:100%;font-size:14px}
td{padding:6px}
.win{color:#00ff66}
.loss{color:red}
.neutro{color:#aaa}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">LAURO</div>

  <div class="menu">
    <div>📊 Dashboard</div>
    <div>🤖 Robôs</div>
    <div>📈 Sinais</div>
    <div>🎓 Aulas</div>
    <div>💎 Planos</div>
  </div>

  <div class="conta">
    Conta Demo<br><br>
    <b>R$ <span id="saldoLateral">1000</span></b><br><br>
    Preço Real<br>
    <b id="precoAtual">0.00</b>
  </div>
</div>

<div class="main">

  <div class="top">
    <h1>Dashboard</h1>
    <button class="criar">+ Criar Novo Robô</button>
  </div>

  <div class="cards">
    <div class="card">Saldo<br><b id="saldo">1000</b></div>
    <div class="card">Lucro<br><b id="lucro">0</b></div>
    <div class="card">Win Rate<br><b id="winrate">0%</b></div>
    <div class="card">Vitórias<br><b id="wins">0</b></div>
    <div class="card">Derrotas<br><b id="loss">0</b></div>
  </div>

  <div class="controls">
    Ativo:
    <select id="ativo">
      <option value="BTCUSDT">BTC/USDT</option>
      <option value="ETHUSDT">ETH/USDT</option>
      <option value="BNBUSDT">BNB/USDT</option>
      <option value="SOLUSDT">SOL/USDT</option>
    </select>

    <button class="ligar" onclick="ligar()">Ligar Robô</button>
    <button class="parar" onclick="parar()">Parar</button>
    <span id="status" style="margin-left:20px;">Aguardando...</span>
  </div>

  <div class="grid">
    <div class="box">
      <h2>Gráfico de Preço Real</h2>
      <canvas id="grafico" width="900" height="350"></canvas>
    </div>

    <div class="box">
      <h2>Últimas Operações</h2>
      <table>
        <tbody id="historico"></tbody>
      </table>
    </div>
  </div>

</div>

<script>
let saldo = 1000;
let saldoInicial = 1000;
let vitorias = 0;
let derrotas = 0;
let rodando = false;
let intervalo = null;
let pontos = [];

let metaLucro = 80;
let stopLoss = -60;
let historicoPreco = [];

async function buscarPrecoReal(){
  try{
    let ativo = document.getElementById("ativo").value;
    let url = "https://api.binance.com/api/v3/ticker/price?symbol=" + ativo;
    let resposta = await fetch(url);
    let dados = await resposta.json();

    if(!dados.price) return null;

    return parseFloat(dados.price);
  }catch(e){
    return null;
  }
}

function atualizarTela(){
  let lucro = saldo - saldoInicial;

  document.getElementById("saldo").innerText = saldo;
  document.getElementById("saldoLateral").innerText = saldo;
  document.getElementById("lucro").innerText = lucro;
  document.getElementById("wins").innerText = vitorias;
  document.getElementById("loss").innerText = derrotas;

  let total = vitorias + derrotas;
  let wr = total > 0 ? ((vitorias / total) * 100).toFixed(1) : 0;
  document.getElementById("winrate").innerText = wr + "%";

  desenharGrafico();

  if(lucro >= metaLucro){
    parar();
    document.getElementById("status").innerText = "Meta atingida ✅";
  }

  if(lucro <= stopLoss){
    parar();
    document.getElementById("status").innerText = "Stop atingido ❌";
  }
}

function desenharGrafico(){
  let canvas = document.getElementById("grafico");
  let ctx = canvas.getContext("2d");

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#020202";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle = "#222";
  ctx.lineWidth = 1;

  for(let i=0;i<10;i++){
    let y = i * 35;
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();
  }

  if(pontos.length < 2) return;

  let min = Math.min(...pontos);
  let max = Math.max(...pontos);

  if(min === max){
    min = min - 1;
    max = max + 1;
  }

  ctx.strokeStyle = "#d4af37";
  ctx.lineWidth = 3;
  ctx.beginPath();

  pontos.forEach((valor, i)=>{
    let x = (i / (pontos.length - 1)) * canvas.width;
    let y = canvas.height - ((valor - min) / (max - min)) * canvas.height;

    if(i === 0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.stroke();
}

function inteligencia(){
  if(historicoPreco.length < 5) return "AGUARDAR";

  let p1 = historicoPreco[historicoPreco.length - 1];
  let p2 = historicoPreco[historicoPreco.length - 2];
  let p3 = historicoPreco[historicoPreco.length - 3];

  let alta = p1 > p2 && p2 > p3;
  let baixa = p1 < p2 && p2 < p3;

  if(alta) return "CALL";
  if(baixa) return "PUT";

  return "AGUARDAR";
}

async function operar(){
  let preco = await buscarPrecoReal();

  if(!preco){
    document.getElementById("status").innerText = "Erro ao buscar preço";
    return;
  }

  document.getElementById("precoAtual").innerText = preco.toFixed(2);

  historicoPreco.push(preco);
  pontos.push(preco);

  if(historicoPreco.length > 20) historicoPreco.shift();
  if(pontos.length > 50) pontos.shift();

  let sinal = inteligencia();

  if(sinal === "AGUARDAR"){
    adicionarHistorico("AGUARDAR", "neutro", "Sem entrada");
    atualizarTela();
    return;
  }

  let ganhou = Math.random() < 0.65;

  if(ganhou){
    saldo += 10;
    vitorias++;
    adicionarHistorico("WIN", "win", sinal);
  }else{
    saldo -= 10;
    derrotas++;
    adicionarHistorico("LOSS", "loss", sinal);
  }

  atualizarTela();
}

function adicionarHistorico(resultado, classe, direcao){
  let historico = document.getElementById("historico");
  let hora = new Date().toLocaleTimeString();
  let ativo = document.getElementById("ativo").value;

  historico.innerHTML =
    `<tr>
      <td>${hora}</td>
      <td>${ativo}</td>
      <td>${direcao}</td>
      <td class="${classe}">${resultado}</td>
    </tr>` + historico.innerHTML;
}

function ligar(){
  if(rodando) return;

  rodando = true;
  document.getElementById("status").innerText = "Buscando preço real...";

  intervalo = setInterval(operar, 2000);
}

function parar(){
  rodando = false;
  clearInterval(intervalo);
}

atualizarTela();
</script>

</body>
</html>
