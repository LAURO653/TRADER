<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Lauro Trader PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#000;
  color:white;
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:230px;
  background:#000;
  padding:20px;
  border-right:1px solid #d4af37;
}

.logo{
  font-size:28px;
  color:#d4af37;
  font-weight:bold;
  margin-bottom:20px;
}

.menu div{
  margin:15px 0;
  color:#aaa;
  cursor:pointer;
}
.menu div:hover{
  color:#d4af37;
}

/* MAIN */
.main{
  flex:1;
  padding:20px;
}

/* TOPO */
.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.btn{
  background:#d4af37;
  color:black;
  padding:10px 20px;
  border-radius:10px;
}

/* METRICS */
.metrics{
  display:flex;
  gap:15px;
  margin-top:20px;
}

.metric{
  flex:1;
  background:#111;
  padding:15px;
  border-radius:10px;
  border:1px solid #d4af37;
}

/* GRID PRINCIPAL */
.grid{
  display:flex;
  gap:20px;
  margin-top:20px;
}

/* GRAFICO */
.chart-box{
  flex:2;
  background:#111;
  padding:20px;
  border-radius:15px;
  border:1px solid #d4af37;
}

/* TABELA */
.table-box{
  flex:1;
  background:#111;
  padding:20px;
  border-radius:15px;
  border:1px solid #d4af37;
}

table{
  width:100%;
  font-size:12px;
}

td{
  padding:5px;
}

.win{color:#00ff88;}
.loss{color:red;}

</style>
</head>

<body>

<div class="sidebar">
<div class="logo">LAURO</div>

<div class="menu">
<div>📊 Dashboard</div>
<div>🤖 Robôs</div>
<div>📈 Sinais</div>
<div>🎓 Aulas</div>
<div>💎 Planos</div>
</div>

<br><br>

<div style="border:1px solid #d4af37;padding:10px;border-radius:10px;">
Conta Demo<br>
<b>R$ 1000</b>
</div>

</div>

<div class="main">

<div class="top">
<h2>Dashboard</h2>
<div class="btn">+ Criar Novo Robô</div>
</div>

<div class="metrics">
<div class="metric">Saldo<br><b id="saldo">1000</b></div>
<div class="metric">Lucro<br><b id="lucro">0</b></div>
<div class="metric">Win Rate<br><b id="win">0%</b></div>
<div class="metric">Vitórias<br><b id="wins">0</b></div>
<div class="metric">Derrotas<br><b id="loss">0</b></div>
</div>

<div style="margin-top:15px;">
<button onclick="start()">Ligar</button>
<button onclick="stop()">Parar</button>
</div>

<div class="grid">

<div class="chart-box">
<h3>Gráfico de Desempenho</h3>
<canvas id="grafico"></canvas>
</div>

<div class="table-box">
<h3>Últimas Operações</h3>

<table id="tabela">
<tr>
<td>Hora</td>
<td>Ativo</td>
<td>Resultado</td>
</tr>
</table>

</div>

</div>

</div>

<script>

let saldo=1000;
let wins=0;
let loss=0;
let loop;
let grafico;

function iniciarGrafico(){
const ctx=document.getElementById('grafico');

grafico=new Chart(ctx,{
type:'line',
data:{
labels:[],
datasets:[{
data:[],
borderColor:'#d4af37',
backgroundColor:'rgba(212,175,55,0.2)',
tension:0.3
}]
},
options:{
plugins:{legend:{display:false}},
scales:{x:{display:false}}
}
});
}

function start(){
loop=setInterval(()=>{
let r=Math.random()>0.45;

let hora=new Date().toLocaleTimeString();

if(r){
saldo+=10;
wins++;
addTabela(hora,"EUR/USD","WIN");
}else{
saldo-=10;
loss++;
addTabela(hora,"EUR/USD","LOSS");
}

update();
updateChart();

},2000);
}

function stop(){
clearInterval(loop);
}

function update(){
document.getElementById("saldo").innerText=saldo;
document.getElementById("lucro").innerText=saldo-1000;

let total=wins+loss;
let pct=total?((wins/total)*100).toFixed(1):0;

document.getElementById("win").innerText=pct+"%";
document.getElementById("wins").innerText=wins;
document.getElementById("loss").innerText=loss;
}

function updateChart(){
grafico.data.labels.push("");
grafico.data.datasets[0].data.push(saldo);

if(grafico.data.labels.length>30){
grafico.data.labels.shift();
grafico.data.datasets[0].data.shift();
}

grafico.update();
}

function addTabela(h,a,r){
let tabela=document.getElementById("tabela");
let linha=`<tr>
<td>${h}</td>
<td>${a}</td>
<td class="${r=="WIN"?"win":"loss"}">${r}</td>
</tr>`;
tabela.innerHTML+=linha;
}

window.onload=iniciarGrafico;

</script>

</body>
</html>
