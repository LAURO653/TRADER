<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>TESTADOR PRO V2</title>

<script src="https://s3.tradingview.com/tv.js"></script>

<style>
body {
    background:#0b0b0b;
    color:#fff;
    font-family:Arial;
}

.box {
    border:2px solid gold;
    padding:10px;
    margin:10px;
    border-radius:10px;
}

button {
    padding:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.green {background:#00c853;}
.red {background:#d50000;}
.yellow {background:gold;}

textarea {
    width:100%;
    height:200px;
    background:#000;
    color:#00ff00;
}

table {
    width:100%;
    text-align:center;
}

.win {color:#00ff00;}
.loss {color:#ff0000;}
</style>
</head>

<body>

<div class="box">
<h2>TESTADOR DE SCRIPT</h2>

<button class="yellow" onclick="abrirConversor()">Converter Script</button>

<br><br>

Ativo:
<select id="ativo">
<option value="BINANCE:BTCUSDT">BTC</option>
</select>

Tempo:
<select id="tempo">
<option value="60">1 minuto</option>
<option value="180">3 minutos</option>
<option value="300">5 minutos</option>
</select>

<br><br>

<button class="green" onclick="ligar()">LIGAR TESTE</button>
<button class="red" onclick="parar()">PARAR</button>

<p id="status">Status: parado</p>
<p id="tempoRestante"></p>

</div>

<div id="tvchart" style="height:400px;"></div>

<div class="box">
<h3>SINAL</h3>
<h1 id="sinal">AGUARDAR</h1>
</div>

<div class="box">
<h3>COLE SEU SCRIPT</h3>
<textarea id="script"></textarea>
</div>

<div class="box">
<h3>RESULTADO</h3>
<p>Saldo: <span id="saldo">1000</span></p>
<p>WinRate: <span id="wr">0</span>%</p>
<p>Wins: <span id="wins">0</span></p>
<p>Loss: <span id="loss">0</span></p>
</div>

<div class="box">
<h3>HISTÓRICO</h3>
<table id="historico">
<tr><th>Hora</th><th>Sinal</th><th>Resultado</th></tr>
</table>
</div>

<script>

let saldo=1000
let wins=0
let loss=0
let rodando=false
let tempo=60
let entry=null

new TradingView.widget({
    container_id: "tvchart",
    width: "100%",
    height: 400,
    symbol: "BINANCE:BTCUSDT",
    interval: "1",
    theme: "dark"
})

function ligar(){
    rodando=true
    tempo=parseInt(document.getElementById("tempo").value)
    document.getElementById("status").innerText="Rodando"
    loop()
}

function parar(){
    rodando=false
    document.getElementById("status").innerText="Parado"
}

async function loop(){
    if(!rodando) return

    let price = await fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT")
    .then(r=>r.json())

    let valor=parseFloat(price.price)

    let script=document.getElementById("script").value

    let candles=[{close:valor,open:valor}]

    let sinal="AGUARDAR"

    try{
        sinal = eval(script)
    }catch(e){
        document.getElementById("status").innerText="Erro script"
    }

    document.getElementById("sinal").innerText=sinal

    if(sinal=="CALL" || sinal=="PUT"){
        entry=valor
        setTimeout(()=>finalizar(sinal,entry),tempo*1000)
    }

    document.getElementById("tempoRestante").innerText="Próxima análise em "+tempo+"s"

    setTimeout(loop,tempo*1000)
}

function finalizar(tipo,entry){
    fetch("https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT")
    .then(r=>r.json())
    .then(p=>{

        let atual=parseFloat(p.price)
        let win=false

        if(tipo=="CALL" && atual>entry) win=true
        if(tipo=="PUT" && atual<entry) win=true

        if(win){
            saldo+=10
            wins++
        }else{
            saldo-=10
            loss++
        }

        atualizarPainel()
        addHistorico(tipo,win)
    })
}

function atualizarPainel(){
    document.getElementById("saldo").innerText=saldo
    document.getElementById("wins").innerText=wins
    document.getElementById("loss").innerText=loss

    let wr = wins+loss>0 ? ((wins/(wins+loss))*100).toFixed(1):0
    document.getElementById("wr").innerText=wr
}

function addHistorico(tipo,win){
    let tabela=document.getElementById("historico")

    let hora=new Date().toLocaleTimeString()

    tabela.innerHTML += `
    <tr>
        <td>${hora}</td>
        <td>${tipo}</td>
        <td class="${win?'win':'loss'}">${win?'WIN':'LOSS'}</td>
    </tr>`
}

function abrirConversor(){
    alert("Conversor já ativo (cole script Avalon)")
}

</script>

</body>
</html>
